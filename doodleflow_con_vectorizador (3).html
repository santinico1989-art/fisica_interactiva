            const ctx = exportCanvas.getContext('2d');

            // ====================================================================
            // BUFFER DE ÚLTIMO FOTOGRAMA BUENO (anti-pantallazo blanco)
            // Guarda siempre el último fotograma que se validó correctamente.
            // Si un fotograma nuevo resulta "en blanco", se reutiliza el buffer.
            // ====================================================================
            const lastGoodFrameCanvas = document.createElement('canvas');
            lastGoodFrameCanvas.width = width;
            lastGoodFrameCanvas.height = height;
            const lastGoodCtx = lastGoodFrameCanvas.getContext('2d');
            let hasLastGoodFrame = false;

            // ====================================================================
            // HELPER: Rasterizar SVG de forma robusta sin pantallazos blancos
            // Usa createImageBitmap (hardware-accelerated, sin race condition)
            // con fallback a Image.decode() y finalmente a Image.onload + delay.
            // ====================================================================
            const rasterizeSvgToDrawable = async (svgString) => {
              const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });

              // Intentar con createImageBitmap primero (más fiable, sin race condition de rasterización)
              if (typeof createImageBitmap === 'function') {
                try {
                  const bitmap = await createImageBitmap(svgBlob);
                  return bitmap;
                } catch (e) {
                  // Fallback si createImageBitmap falla con SVG
                }
              }

              // Fallback: Image con decode() API para garantizar rasterización completa
              const svgUrl = URL.createObjectURL(svgBlob);
              const svgImg = new Image();
              
              try {
                await new Promise((resolve, reject) => {
                  svgImg.onload = resolve;
                  svgImg.onerror = reject;
                  svgImg.src = svgUrl;
                });

                // Usar decode() si está disponible - garantiza que la imagen está lista para pintar
                if (typeof svgImg.decode === 'function') {
                  await svgImg.decode();
                } else {
                  // Fallback final: esperar un tiempo más generoso para rasterización
                  await new Promise(r => setTimeout(r, 50));
                }
              } catch (e) {
                console.warn("Error rasterizando SVG, usando fallback con delay:", e);
                await new Promise(r => setTimeout(r, 80));
              }

              // Liberar URL después de que la imagen está completamente lista
              // (no la liberamos antes porque decode() podría necesitarla)
              URL.revokeObjectURL(svgUrl);
              return svgImg;
            };

            // ====================================================================
            // HELPER: Verificar que el canvas tiene contenido SVG real (no está en blanco)
            // Muestreamos pixeles en el área donde debería estar el SVG dibujado.
            // Si sólo hay color de fondo, el fotograma es inválido.
            // ====================================================================
            const isFrameValid = (canvasCtx, canvasW, canvasH, bgColor) => {
              // Muestrear 16 puntos distribuidos en la zona central donde va el SVG
              const samplePoints = [];
              const marginX = canvasW * 0.15;
              const marginY = canvasH * 0.15;
              for (let sx = 0; sx < 4; sx++) {
                for (let sy = 0; sy < 4; sy++) {
                  samplePoints.push({
                    x: Math.floor(marginX + (sx / 3) * (canvasW - 2 * marginX)),
                    y: Math.floor(marginY + (sy / 3) * (canvasH - 2 * marginY))
                  });
                }
              }

              // Obtener el color de fondo como referencia RGB
              const bgCanvas = document.createElement('canvas');
              bgCanvas.width = 1;
              bgCanvas.height = 1;
              const bgCtx = bgCanvas.getContext('2d');
              bgCtx.fillStyle = bgColor;
              bgCtx.fillRect(0, 0, 1, 1);
              const bgPixel = bgCtx.getImageData(0, 0, 1, 1).data;
              const bgR = bgPixel[0], bgG = bgPixel[1], bgB = bgPixel[2];

              let differentPixels = 0;
              for (const pt of samplePoints) {
                const pixel = canvasCtx.getImageData(pt.x, pt.y, 1, 1).data;
                const dr = Math.abs(pixel[0] - bgR);
                const dg = Math.abs(pixel[1] - bgG);
                const db = Math.abs(pixel[2] - bgB);
                // Si el píxel difiere significativamente del fondo, es contenido real
                if (dr > 8 || dg > 8 || db > 8) {
                  differentPixels++;
                }
              }
              // Si al menos 1 de los 16 puntos tiene contenido, el fotograma es válido
              return differentPixels >= 1;
            };

            // Determinar color de fondo del tema actual
            const getBgColorForTheme = (theme) => {
              if (theme.id === 'whiteboard') return '#f8fafc';
              if (theme.id === 'chalkboard') return '#022c22';
              if (theme.id === 'blueprint') return '#1e3a8a';
              return '#0f172a';
            };
            const currentBgColor = getBgColorForTheme(activeTheme);

            // ====================================================================
            // HELPER: Preparar SVG clonado con estilos resueltos
            // ====================================================================
            const prepareClonedSvg = () => {
              const clonedSvg = svgEl.cloneNode(true);
              const finalStrokeColor = customStroke || activeTheme.defaultStroke || '#000000';
              
              // Inyectar estilo que desactiva todas las transiciones/animaciones CSS
              const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
              styleEl.textContent = '* { transition: none !important; animation: none !important; will-change: auto !important; }';
              clonedSvg.insertBefore(styleEl, clonedSvg.firstChild);

              clonedSvg.querySelectorAll('path').forEach(path => {
                // Eliminar completamente cualquier transición inline
                path.style.transition = 'none';
                path.style.animation = 'none';
                
                const hadNoStroke = path.getAttribute('data-had-no-stroke') === 'true';
                const originalFill = path.getAttribute('data-original-fill');
                
                let stroke = path.style.stroke || path.getAttribute('stroke') || 'currentColor';
                
                if (stroke === 'currentColor') {
                  stroke = finalStrokeColor;
                }
                
                if (colorMode === 'color') {
                  const dataColor = path.getAttribute('data-color-stroke');
                  if (dataColor) {
                    stroke = dataColor;
                  } else if (hadNoStroke && originalFill) {
                    stroke = originalFill;
                  }
                } else {
                  if (!hadNoStroke) {
                    stroke = finalStrokeColor;
                  } else {
                    stroke = path.style.stroke || 'transparent';
                  }
                }
                
                path.setAttribute('stroke', stroke);
                path.style.stroke = stroke;
                
                // Forzar que el fill de paths que aún no se han revelado sea explícitamente 'none'
                // para evitar flashes de fill durante la serialización
                const currentFill = path.style.fill;
                if (currentFill === 'none' || currentFill === '') {
                  path.setAttribute('fill', 'none');
                }
              });

              return clonedSvg;
            };

            // ====================================================================
            // HELPER: Calcular dimensiones de posicionamiento del SVG en el canvas
            // ====================================================================
            const calcSvgDimensions = (clonedSvg) => {
              const currentAspectRatio = getSvgAspectRatio(clonedSvg);
              const svgW = currentAspectRatio >= (width / height) ? width * 0.90 : height * 0.90 * currentAspectRatio;
              const svgH = currentAspectRatio >= (width / height) ? width * 0.90 / currentAspectRatio : height * 0.90;
              const dx = (width - svgW) / 2;
              const dy = (height - svgH) / 2;
              return { svgW, svgH, dx, dy, currentAspectRatio };
            };

            // ====================================================================
            // HELPER: Dibujar la mano/cursor sobre el canvas del fotograma
            // ====================================================================
            const drawHandOverlay = (targetCtx, progress, clonedSvg, dims, frameIdx, containerRect, customHandImgRef) => {
              if (handStyle === 'none') return;

              let handX = width / 2;
              let handY = height / 2;
              let activePathColor = customStroke || activeTheme.defaultStroke || '#000000';

              const svgCoords = getHandCoordsAtProgress(progress);
              if (svgCoords) {
                const viewBoxAttr = clonedSvg.getAttribute('viewBox');
                const widthAttr = clonedSvg.getAttribute('width');
                const heightAttr = clonedSvg.getAttribute('height');
                let vbMinX = 0, vbMinY = 0, vbW = 100, vbH = 100;
                if (viewBoxAttr) {
                  const parts = viewBoxAttr.trim().split(/[\s,]+/);
                  if (parts.length === 4) {
                    vbMinX = parseFloat(parts[0]) || 0;
                    vbMinY = parseFloat(parts[1]) || 0;
                    vbW = parseFloat(parts[2]) || 100;
                    vbH = parseFloat(parts[3]) || 100;
                  }
                } else if (widthAttr && heightAttr) {
                  vbW = parseFloat(widthAttr) || 100;
                  vbH = parseFloat(heightAttr) || 100;
                }

                let wobbleX = 0;
                let wobbleY = 0;
                if (progress > 0 && progress < 1) {
                  wobbleX = Math.sin(frameIdx * 0.4) * 2.5;
                  wobbleY = Math.cos(frameIdx * 0.5) * 2.5;
                }
                handX = dims.dx + ((svgCoords.x - vbMinX) / vbW) * dims.svgW + wobbleX;
                handY = dims.dy + ((svgCoords.y - vbMinY) / vbH) * dims.svgH + wobbleY;
                activePathColor = svgCoords.color;
              }

              if (showParticles && handStyle === 'magic_wand' && frameIdx > 0 && progress < 1) {
                spawnLocalParticles(handX, handY);
              }
              if (showParticles && handStyle === 'magic_wand') {
                const activeP = updateLocalParticles();
                drawParticlesOnCanvas(targetCtx, activeP);
              }

              if (handStyle === 'marker_right') {
                drawMarkerRightHand(targetCtx, handX, handY, activePathColor);
              } else if (handStyle === 'chalk') {
                drawChalkHand(targetCtx, handX, handY);
              } else if (handStyle === 'magic_wand') {
                drawMagicWand(targetCtx, handX, handY, frameIdx);
              } else if (handStyle === 'custom_png' && customHandImgRef && customHandImgRef.loaded) {
                const scaleX = width / (containerRect.width || 800);
                const scaleY = height / (containerRect.height || 600);
                targetCtx.drawImage(customHandImgRef.img, handX + customPngOffsetX * scaleX, handY + customPngOffsetY * scaleY, 150 * scaleX, 200 * scaleY);
              }
            };

            // ====================================================================
            // HELPER: Renderizar fotograma DIRECTAMENTE con Path2D
            // Sin SVG→Image→Canvas: 100% síncrono, sin race conditions, sin pantallazos.
            // ====================================================================
            const renderValidatedFrame = (progress, frameIdx, containerRect, customHandRef) => {
              // 1. Dibujar fondo
              drawCanvasBackground(ctx, width, height, activeTheme, showGrid);

              // 2. Obtener datos de paths
              const data = pathsDataRef.current;
              const svgEl2 = svgWrapperRef.current?.querySelector('svg');
              if (!data.length || !svgEl2) return;

              // 3. Calcular escala y posición del SVG en el canvas
              const viewBoxAttr = svgEl2.getAttribute('viewBox') || '0 0 100 100';
              const vbParts = viewBoxAttr.trim().split(/[\s,]+/);
              const vbX = parseFloat(vbParts[0]) || 0;
              const vbY = parseFloat(vbParts[1]) || 0;
              const vbW = parseFloat(vbParts[2]) || 100;
              const vbH = parseFloat(vbParts[3]) || 100;
              const aspect = vbW / vbH;

              const svgW = aspect >= (width / height) ? width * 0.90 : height * 0.90 * aspect;
              const svgH = aspect >= (width / height) ? width * 0.90 / aspect : height * 0.90;
              const dx = (width - svgW) / 2;
              const dy = (height - svgH) / 2;

              const scaleX = svgW / vbW;
              const scaleY = svgH / vbH;

              const finalStrokeColor = customStroke || activeTheme.defaultStroke || '#000000';

              // 4. Dibujar cada path directamente con Path2D
              ctx.save();
              ctx.translate(dx - vbX * scaleX, dy - vbY * scaleY);
              ctx.scale(scaleX, scaleY);
              ctx.lineCap = 'round';
              ctx.lineJoin = 'round';

              data.forEach((pathObj) => {
                const { element, length, startPct, endPct } = pathObj;
                if (progress <= startPct) return; // No iniciado aún

                const d = element.getAttribute('d');
                if (!d) return;

                let p2d;
                try { p2d = new Path2D(d); } catch(e) { return; }

                ctx.save();
                
                // Obtener y aplicar la matriz CTM del elemento
                let localScaleX = 1;
                let localScaleY = 1;
                try {
                  const matrix = element.getCTM();
                  if (matrix) {
                    ctx.transform(matrix.a, matrix.b, matrix.c, matrix.d, matrix.e, matrix.f);
                    localScaleX = Math.sqrt(matrix.a * matrix.a + matrix.b * matrix.b) || 1;
                    localScaleY = Math.sqrt(matrix.c * matrix.c + matrix.d * matrix.d) || 1;
                  }
                } catch(e) {}

                // Resolver color del trazo
                const dataColor = element.getAttribute('data-color-stroke');
                const originalFill = element.getAttribute('data-original-fill');
                const hadNoStroke = element.getAttribute('data-had-no-stroke') === 'true';
                let strokeCol = finalStrokeColor;
                if (colorMode === 'color') {
                  strokeCol = dataColor || element.getAttribute('stroke') || originalFill || finalStrokeColor;
                }
                if (!strokeCol || strokeCol === 'currentColor' || strokeCol === 'none') {
                  strokeCol = finalStrokeColor;
                }

                const sw = parseFloat(strokeWidth) || 2;
                ctx.strokeStyle = strokeCol;
                
                // Compensar la escala total (global + local del path)
                const totalScale = Math.min(scaleX * localScaleX, scaleY * localScaleY) || 1;
                ctx.lineWidth = sw / totalScale;

                if (progress >= endPct) {
                  // Trazo completo
                  ctx.stroke(p2d);
                  // Restaurar fill si el path original lo tenía
                  if (originalFill && originalFill !== 'none') {
                    ctx.fillStyle = originalFill;
                    ctx.fill(p2d);
                  }
                } else {
                  // Trazo parcial: simular stroke-dashoffset con setLineDash
                  const localProgress = (progress - startPct) / (endPct - startPct);
                  const drawn = length * localProgress;
                  ctx.setLineDash([drawn, length * 2]);
                  ctx.lineDashOffset = 0;
                  ctx.stroke(p2d);
                  ctx.setLineDash([]);
                }
                
                ctx.restore();
              });

              ctx.restore();

              // 5. Dibujar la mano/cursor sobre el canvas
              const dims = { svgW, svgH, dx, dy };
              drawHandOverlay(ctx, progress, svgEl2, dims, frameIdx, containerRect, customHandRef);
            };

            const durationSeconds = videoDurationSec / drawingSpeed;
            const fps = 30;
            const totalFrames = Math.ceil(durationSeconds * fps);

            let customHandImg = null;
            let customHandImgLoaded = false;
            if (handStyle === 'custom_png' && customPngUrl) {
              setExportStatusText("Cargando mano personalizada...");
              customHandImg = new Image();
              customHandImg.crossOrigin = "anonymous";
              customHandImg.src = customPngUrl;
              await new Promise((resolve) => {
                customHandImg.onload = () => {
                  customHandImgLoaded = true;
                  resolve();
                };
                customHandImg.onerror = () => {
                  console.warn("Fallo al pre-cargar la mano PNG.");
                  resolve();
                };
              });
            }
            const customHandRef2 = { img: customHandImg, loaded: customHandImgLoaded };

            const localParticles = [];
            const spawnLocalParticles = (px, py) => {
              for (let i = 0; i < 3; i++) {
                localParticles.push({
                  x: px,
                  y: py,
                  vx: (Math.random() - 0.5) * 16,
                  vy: (Math.random() - 0.8) * 12 - 4,
                  color: `hsl(${Math.random() * 360}, 95%, 70%)`,
                  size: Math.random() * 12 + 6,
                  alpha: 1,
                  life: 1.0
                });
              }
            };

            const updateLocalParticles = () => {
              const active = [];
              localParticles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.alpha -= 0.03;
                p.life -= 0.03;
                if (p.alpha > 0) {
                  active.push(p);
                }
              });
              localParticles.length = 0;
              localParticles.push(...active);
              return active;
            };

            const canUseOffline = mode === 'offline' && (typeof Whammy !== 'undefined') && (() => {
              try {
                const testCanvas = document.createElement('canvas');
                return testCanvas.toDataURL('image/webp').indexOf('data:image/webp') === 0;
              } catch(e) { return false; }
            })();

            if (mode === 'offline' && !canUseOffline) {
              setExportStatusText("Tu navegador no soporta renderizado WebP. Cambiando a tiempo real...");
              await new Promise(r => setTimeout(r, 1200));
            }

            const getSvgAspectRatio = (svgElement) => {
              try {
                const viewBoxAttr = svgElement.getAttribute('viewBox');
                const widthAttr = svgElement.getAttribute('width');
                const heightAttr = svgElement.getAttribute('height');
                let w = 100;
                let h = 100;
                if (viewBoxAttr) {
                  const parts = viewBoxAttr.trim().split(/[\s,]+/);
                  if (parts.length === 4) {
                    w = parseFloat(parts[2]) || 100;
                    h = parseFloat(parts[3]) || 100;
                  }
                } else if (widthAttr && heightAttr) {
                  w = parseFloat(widthAttr) || 100;
                  h = parseFloat(heightAttr) || 100;
                }
                return (w > 0 && h > 0 && !isNaN(w) && !isNaN(h)) ? (w / h) : 1;
              } catch(e) {
                return 1;
              }
            };

            const canvasContainer = canvasRef.current;
            const containerRect = canvasContainer.getBoundingClientRect();

            if (mode === 'offline' && canUseOffline) {
              setExportStatusText("Procesando fotogramas vectoriales (offline)...");
              const encoder = new Whammy.Video(fps, 0.90);

              for (let i = 0; i <= totalFrames; i++) {
                if (exportCancelledRef.current) {
                  setIsExporting(false);
                  applyProgressToDOM(animProgress);
                  return;
                }

                const progress = i / totalFrames;
                setExportProgress(Math.round((i / totalFrames) * 92));

                // Renderizar fotograma directamente con Path2D (síncrono, sin await)
                renderValidatedFrame(progress, i, containerRect, customHandRef2);

                encoder.add(exportCanvas);

                // Ceder control al event loop cada 3 frames para no bloquear la UI
                if (i % 3 === 0) {
                  await new Promise(resolve => setTimeout(resolve, 0));
                }
              }

              setExportStatusText("Compilando archivo de video WebM...");
              setExportProgress(96);
              await new Promise(r => setTimeout(r, 300));

              encoder.compile(false, (outputBlob) => {
                if (exportCancelledRef.current) return;
                setExportProgress(100);
                setExportStatusText("¡Listo para descargar!");
                
                const url = URL.createObjectURL(outputBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `doodleflow_${selectedTemplate === 'custom' ? 'raster' : selectedTemplate}.webm`;
                a.click();
                
                setTimeout(() => {
                  URL.revokeObjectURL(url);
                  setIsExporting(false);
                  applyProgressToDOM(animProgress);
                }, 800);
              });

            } else {
              setExportStatusText("Conectando canales de audio y video...");
              
              if (isSoundEnabled && !synthInstance.ctx) {
                synthInstance.init();
              }

              const canvasStream = exportCanvas.captureStream(30);
              let combinedStream = canvasStream;
              let mediaDest = null;

              if (isSoundEnabled && synthInstance.ctx && synthInstance.gainNode) {
                try {
                  mediaDest = synthInstance.ctx.createMediaStreamDestination();
                  synthInstance.gainNode.connect(mediaDest);
                  
                  const combinedTracks = [
                    ...canvasStream.getVideoTracks(),
                    ...mediaDest.stream.getAudioTracks()
                  ];
                  combinedStream = new MediaStream(combinedTracks);
                } catch(e) {
                  console.error("No se pudo conectar el audio al grabador de video", e);
                }
              }

              let recordOptions = { mimeType: 'video/webm;codecs=vp9' };
              if (!MediaRecorder.isTypeSupported(recordOptions.mimeType)) {
                recordOptions = { mimeType: 'video/webm;codecs=vp8' };
              }
              if (!MediaRecorder.isTypeSupported(recordOptions.mimeType)) {
                recordOptions = { mimeType: 'video/webm' };
              }
              if (!MediaRecorder.isTypeSupported(recordOptions.mimeType)) {
                recordOptions = { mimeType: 'video/mp4' };
              }

              const chunks = [];
              const mediaRecorder = new MediaRecorder(combinedStream, recordOptions);
              
              mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) {
                  chunks.push(e.data);
                }
              };

              mediaRecorder.onstop = () => {
                if (exportCancelledRef.current) return;
                
                if (mediaDest && synthInstance.gainNode) {
                  try { synthInstance.gainNode.disconnect(mediaDest); } catch(err){}
                }

                setExportProgress(100);
                setExportStatusText("Guardando archivo de video...");
                
                const blobType = recordOptions.mimeType || 'video/webm';
                const fileExt = blobType.includes('mp4') ? 'mp4' : 'webm';
                const videoBlob = new Blob(chunks, { type: blobType });
                const url = URL.createObjectURL(videoBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `doodleflow_audio_${selectedTemplate === 'custom' ? 'raster' : selectedTemplate}.${fileExt}`;
                a.click();

                setTimeout(() => {
                  URL.revokeObjectURL(url);
                  setIsExporting(false);
                  applyProgressToDOM(animProgress);
                }, 800);
              };

              mediaRecorder.start();
              setExportStatusText("Grabando en tiempo real con audio... Por favor espera.");

              const startTime = Date.now();
              const durationMs = durationSeconds * 1000;
              let currentFrame = 0;

              const recordFrame = async () => {
                if (exportCancelledRef.current) {
                  mediaRecorder.stop();
                  setIsExporting(false);
                  applyProgressToDOM(animProgress);
                  return;
                }

                const elapsed = Date.now() - startTime;
                let pct = elapsed / durationMs;
                if (pct > 1) pct = 1;

                setExportProgress(Math.round(pct * 100));
                
                // Renderizar fotograma directamente con Path2D (síncrono)
                renderValidatedFrame(pct, currentFrame, containerRect, customHandRef2);

                currentFrame++;

                if (pct < 1) {
                  requestAnimationFrame(recordFrame);
                } else {
                  setTimeout(() => {
                    mediaRecorder.stop();
                  }, 500);
                }
              };

              recordFrame();
            }
          };

          const handleCancelExport = () => {
            exportCancelledRef.current = true;
            setIsExporting(false);
            applyProgressToDOM(animProgress);
          };

          return (
            <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col font-sans select-none antialiased relative">
              
              {/* CABECERA */}

                    <div className="p-2 bg-blue-600 rounded-lg shadow-inner">
                      <Sparkles className="w-6 h-6 text-white" />
                    </div>
                    <div>
                      <h1 className="text-xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-200">
                        DOODLEFLOW
                      </h1>
                      <p className="text-xs text-slate-400">Grabación de Pizarra Blanca 100% Fluida</p>
                    </div>
                  </div>

                  <div className="flex items-center gap-3">
                    {/* EXPORTAR VIDEO NATIVO */}
                    <div className="flex items-center gap-1.5 bg-slate-900 border border-slate-800 p-1 rounded-xl">
                      <button 
                        onClick={() => handleExportVideo('offline')}
                        className="flex items-center gap-1.5 px-3 py-1.5 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white rounded-lg text-xs font-bold shadow-md transition-all active:scale-95"
                        title="Exporta el video en Full HD en 2 segundos sin sonido"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span>Descarga Rápida</span>
                      </button>
                      <button 
                        onClick={() => handleExportVideo('realtime')}
                        className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-purple-300 rounded-lg text-xs font-bold transition-all active:scale-95"
                        title="Graba en tiempo real incluyendo el sonido de tiza/marcador"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                        <span>Descarga con Audio</span>
                      </button>
                    </div>

                    {/* BOTÓN MODO GRABACIÓN PANTALLA COMPLETA */}
                    <button 
                      onClick={handleEnterFullscreen}
                      className="flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg text-sm font-bold shadow-md transition-all active:scale-95"
                    >
                      <Monitor className="w-4 h-4" />
                      <span>Grabar Pantalla Completa</span>
                    </button>

                    <button onClick={() => setIsSoundEnabled(!isSoundEnabled)} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${isSoundEnabled ? 'bg-indigo-900/40 text-indigo-300 border border-indigo-700/50' : 'bg-slate-800 text-slate-400 border border-slate-700/30'}`}>
                      {isSoundEnabled ? <Volume2 className="w-4 h-4 text-indigo-400" /> : <VolumeX className="w-4 h-4" />}
                      <span>{isSoundEnabled ? 'Sonido Activo' : 'Silenciado'}</span>
                    </button>
                  </div>
                </header>
              )}

              {/* PANEL CENTRAL */}
              <main className="flex-1 grid grid-cols-1 lg:grid-cols-12 overflow-hidden">
                
                {/* ÁREA DE LA PIZARRA */}
                <section 
                  className={`flex flex-col p-6 bg-slate-900 gap-6 transition-all duration-300 ${
                    isFullscreen ? 'fixed inset-0 z-50 p-0 ' + activeTheme.bgClass : 'order-1 lg:order-2 lg:col-span-8'
                  }`}
                  style={{
                    backgroundImage: (isFullscreen && showGrid) ? activeTheme.gridStyle : 'none',
                    backgroundSize: activeTheme.gridSize,
                  }}
                >
                  {/* AJUSTE: El indicador de estado ahora está por fuera del Canvas para evitar grabaciones sucias */}
                  {!isFullscreen && (
                    <div className="flex items-center justify-between px-3 py-1.5 bg-slate-950/80 border border-slate-800 rounded-xl animate-fade-in">
                      <div className="flex items-center gap-2">
                        <span className={`w-2 h-2 rounded-full ${isPlaying ? 'bg-green-500 animate-pulse' : 'bg-yellow-500'}`} />
                        <span className="text-xs font-bold text-slate-300 uppercase tracking-wide">Monitor de Grabación</span>
                      </div>
                      <span className="text-xs font-mono text-slate-400">
                        {isPlaying ? 'Trazando...' : 'Lienzo Listo'} ({currentPathIndex + 1}/{totalPathCount} trazos)
                      </span>
                    </div>
                  )}

                  <div 
                    ref={canvasRef}
                    onMouseMove={handleMouseMoveOnCanvas}
                    onClick={handleCanvasBackgroundClick}
                    tabIndex={0}
                    className={`flex-1 rounded-3xl relative overflow-hidden transition-all shadow-2xl flex items-center justify-center outline-none ${
                      isFullscreen ? 'rounded-none border-none w-screen h-screen' : (activeTheme.bgClass + ' border-2')
                    } ${
                      hideCursorDuringRecord && isFullscreen ? 'hide-cursor-canvas' : ''
                    }`}
                    style={{
                      backgroundImage: (!isFullscreen && showGrid) ? activeTheme.gridStyle : 'none',
                      backgroundSize: activeTheme.gridSize,
                    }}
                  >
                    {activeTheme.dusty && <div className="absolute inset-0 bg-white/[0.03] pointer-events-none mix-blend-overlay" />}
                    
                    {/* CONTENEDOR DEL VECTOR SVG CON RELACIÓN DE ASPECTO Y LÍMITES INTELIGENTES */}
                    <div 
                      ref={svgWrapperRef}
                      className="relative z-10 select-none pointer-events-none flex items-center justify-center max-w-[92%] max-h-[92%] [&_svg]:w-full [&_svg]:h-full [&_svg]:block"
                      style={{
                        aspectRatio: svgAspectRatio,
                        width: svgAspectRatio >= 1 ? '92%' : 'auto',
                        height: svgAspectRatio < 1 ? '92%' : 'auto',
                      }}
                      dangerouslySetInnerHTML={{ __html: activeSvgString }}
                    />

                    {/* LA MANO QUE DIBUJA */}
                    <div 
                      ref={handRef} 
                      className="absolute top-0 left-0 pointer-events-none z-30 will-change-transform"
                      style={{ transform: 'translate3d(0px, 0px, 0)', transition: 'opacity 0.2s', opacity: 0, overflow: 'visible' }}
                    >
                      <svg style={{ width: '400px', height: '400px', overflow: 'visible' }}>
                        {handStyle === 'marker_right' && (
                          <g transform="scale(0.85) translate(0, -254)">
                            <image href={DEFAULT_MARKER_HAND_PNG} width="372" height="300" />
                          </g>
                        )}
                        {handStyle === 'chalk' && (
                          <g transform="scale(0.8) translate(-1, -112)">
                            <ellipse cx="40" cy="115" rx="15" ry="5" fill="rgba(0,0,0,0.15)" filter="blur(3px)" />
                            <polygon points="0,110 8,110 6,85 -2,85" fill="#f8fafc" stroke="#e2e8f0" strokeWidth="1" transform="rotate(-15 3 100)" />
                            <path d="M 2 92 C -10 80, 5 60, 15 72 C 25 84, 18 100, 8 102" fill="#e0a96d" stroke="#c58b51" strokeWidth="1" />
                            <path d="M 12 85 C 8 70, 25 65, 25 80 C 25 92, 12 95, 12 85 Z" fill="#e0a96d" stroke="#c58b51" strokeWidth="1" />
                          </g>
                        )}
                        {handStyle === 'magic_wand' && (
                          <g transform="scale(0.9) translate(0, -95)">
                            <circle cx="0" cy="0" r="14" fill="url(#wandGlow)" opacity="0.6" className="animate-ping" />
                            <rect x="-4" y="10" width="8" height="90" rx="3" fill="#475569" />
                            <rect x="-4" y="1" width="8" height="18" rx="1" fill="#fef08a" />
                            <path d="M 0 -12 L 3 -4 L 11 -3 L 5 3 L 7 11 L 0 7 L -7 11 L -5 3 L -11 -3 L -3 -4 Z" fill="#facc15" stroke="#ca8a04" strokeWidth="1" className="animate-pulse" />
                            <defs>
                              <radialGradient id="wandGlow" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stopColor="#fef08a" />
                                <stop offset="100%" stopColor="#facc15" stopOpacity="0" />
                              </radialGradient>
                            </defs>
                          </g>
                        )}
                        {handStyle === 'custom_png' && (
                          <g transform={`translate(${customPngOffsetX}, ${customPngOffsetY})`}>
                            <image href={customPngUrl} width="150" height="200" />
                          </g>
                        )}
                      </svg>
                    </div>

                    {handStyle === 'magic_wand' && showParticles && (
                      <canvas ref={particleCanvasRef} className="absolute inset-0 w-full h-full pointer-events-none z-20" />
                    )}

                    {/* CONTROL FLOTANTE EXCLUSIVO PARA GRABACIÓN PANTALLA COMPLETA */}
                    {isFullscreen && (
                      <div 
                        className={`absolute bottom-8 left-1/2 -translate-x-1/2 bg-slate-950/95 border border-slate-800/80 px-6 py-4 rounded-2xl flex items-center gap-6 z-50 shadow-2xl transition-opacity duration-300 overlay-control-bar ${
                          showOverlayControls ? 'opacity-100' : 'opacity-0'
                        }`}
                        style={{ pointerEvents: showOverlayControls ? 'auto' : 'none' }}
                      >
                        <div className="flex items-center gap-2">
                          <button onClick={togglePlayback} className="p-3 bg-red-600 hover:bg-red-500 rounded-full text-white transition shadow">
                            {isPlaying ? <Pause className="w-5 h-5" /> : <Play className="w-5 h-5 translate-x-0.5" />}
                          </button>
                          <button onClick={handleReset} className="p-3 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300 transition">
                            <RotateCcw className="w-5 h-5" />
                          </button>
                        </div>

                        {/* Slider de progreso */}
                        <div className="flex items-center gap-3">
                          <input type="range" min="0" max="1" step="0.001" value={animProgress} onChange={handleProgressSlider} className="w-48 md:w-64 accent-red-500 bg-slate-800 h-1.5 rounded-lg appearance-none cursor-pointer" />
                          <span className="text-xs font-mono text-slate-400 font-bold">{Math.round(animProgress * 100)}%</span>
                        </div>

                        {/* Alternar cuadrícula */}
                        <button 
                          onClick={() => setShowGrid(!showGrid)}
                          title="Alternar puntos/cuadrícula"
                          className={`p-2.5 rounded-xl transition ${showGrid ? 'bg-indigo-600/30 text-indigo-300 border border-indigo-500/50' : 'bg-slate-800 text-slate-500'}`}
                        >
                          <GridIcon className="w-4 h-4" />
                        </button>

                        {/* Botón Salir */}
                        <button onClick={handleExitFullscreen} className="p-2.5 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl transition">
                          <Minimize className="w-4 h-4" />
                        </button>

                        {/* Tip de atajos */}
                        <div className="text-[10px] text-slate-500 border-l border-slate-800 pl-4 leading-tight hidden md:block text-left">
                          Haz Clic en la Pizarra para Play/Pausa.<br />
                          Atajos: [Espacio] Play • [R] Reset • [Esc] Salir
                        </div>
                      </div>
                    )}
                  </div>

                  {/* BARRA DE CONTROL DE LA REPRODUCCIÓN ESTÁNDAR */}
                  {!isFullscreen && (
                    <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 flex flex-col md:flex-row items-center gap-4 shadow-md">
                      <div className="flex items-center gap-3">
                        <button onClick={togglePlayback} className="p-3 rounded-full flex items-center justify-center bg-blue-600 hover:bg-blue-500 text-white shadow-lg">
                          {isPlaying ? <Pause className="w-5 h-5" /> : <Play className="w-5 h-5 translate-x-0.5" />}
                        </button>
                        <button onClick={handleReset} className="p-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-full">
                          <RotateCcw className="w-5 h-5" />
                        </button>
                      </div>
                      <div className="flex-1 w-full flex items-center gap-4">
                        <span className="text-xs font-mono text-slate-500 w-10 text-right">0%</span>
                        <input type="range" min="0" max="1" step="0.001" value={animProgress} onChange={handleProgressSlider} className="flex-1 accent-blue-500 bg-slate-800 h-1.5 rounded-lg appearance-none cursor-pointer" />
                        <span className="text-xs font-mono text-slate-300 w-12 text-left">{Math.round(animProgress * 100)}%</span>
                      </div>
                    </div>
                  )}
                </section>

                {/* PANEL LATERAL CONFIGURACIONES */}
                {!isFullscreen && (
                  <section className="order-2 lg:order-1 lg:col-span-4 bg-slate-950/80 p-6 border-r border-slate-800/80 flex flex-col gap-6 overflow-y-auto max-h-[calc(100vh-80px)]">
                    
                    {/* Renderizador Condicional de Errores */}
                    {errorMsg && (
                      <div className="bg-red-950/75 border border-red-800/80 text-red-200 px-4 py-3 rounded-xl text-xs flex items-start justify-between gap-2 animate-fade-in">
                        <span>{errorMsg}</span>
                        <button onClick={() => setErrorMsg(null)} className="text-red-400 hover:text-red-300 font-bold leading-none">×</button>
                      </div>
                    )}

                    <div>
                      <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <FileText className="w-4 h-4 text-blue-400" />
                        1. Selección de Dibujo
                      </h2>
                      <div className="grid grid-cols-2 gap-2 mb-4">
                        <button onClick={() => { setSelectedTemplate('idea'); setParsedCustomSvg(null); setUploadedImageSrc(null); setImgElement(null); handleReset(); }} className={`px-3 py-3 rounded-xl border text-left text-sm font-semibold transition-all flex flex-col gap-1 justify-between ${selectedTemplate === 'idea' && !parsedCustomSvg ? 'bg-blue-600/15 border-blue-500 text-blue-300 shadow-md' : 'bg-slate-900/50 border-slate-800 hover:border-slate-700 text-slate-400 hover:text-slate-200'}`}>
                          <span>Bombilla</span>
                        </button>
                        <button onClick={() => { setSelectedTemplate('rocket'); setParsedCustomSvg(null); setUploadedImageSrc(null); setImgElement(null); handleReset(); }} className={`px-3 py-3 rounded-xl border text-left text-sm font-semibold transition-all flex flex-col gap-1 justify-between ${selectedTemplate === 'rocket' && !parsedCustomSvg ? 'bg-blue-600/15 border-blue-500 text-blue-300 shadow-md' : 'bg-slate-900/50 border-slate-800 hover:border-slate-700 text-slate-400 hover:text-slate-200'}`}>
                          <span>Cohete</span>
                        </button>
                      </div>

                      {/* CONVERTIDOR ALGORÍTMICO DE IMAGEN (PNG/JPG) A VECTOR SVG */}
                      <div className="border-t border-slate-800/60 pt-4 mt-2">
                        <span className="text-xs font-bold text-amber-400 block mb-1">Convertir Imagen (PNG / JPG)</span>
                        <span className="text-[10px] text-slate-400 block mb-3">Sube tu tabla o documento para digitalizarlo en vectores nítidos.</span>
                        
                        <div className="flex flex-col gap-2">
                          <input type="file" accept="image/png, image/jpeg, image/jpg, image/webp" onChange={handleImageUpload} id="image-raster-picker" className="hidden" />
                          <label htmlFor="image-raster-picker" className="w-full bg-slate-900 hover:bg-slate-850 border border-dashed border-amber-500/40 rounded-xl py-3 px-3 text-xs text-center font-bold cursor-pointer transition text-amber-300 hover:text-amber-100 flex items-center justify-center gap-2">
                            <Upload className="w-4 h-4 text-amber-400" />
                            <span>Cargar PNG / JPG / WEBP</span>
                          </label>

                          {uploadedImageSrc && (
                            <div className="bg-slate-900/80 border border-slate-800 rounded-xl p-3 flex flex-col gap-3 mt-2 animate-fade-in">
                              <div className="flex items-center justify-between border-b border-slate-800/80 pb-1.5">
                                <span className="text-[10px] font-bold text-amber-400">Motor de Vectorización</span>
                                <button onClick={clearUploadedImage} className="text-[10px] text-red-400 hover:underline">Eliminar</button>
                              </div>

                              <div className="flex justify-center bg-slate-950 p-2 rounded-lg border border-slate-800/50">
                                <img src={uploadedImageSrc} className="max-h-24 object-contain rounded" alt="Original mini" />
                              </div>

                              {/* ═══ PRESETS DE VECTORIZACIÓN PROFESIONAL ═══ */}
                              <div>
                                <label className="text-[10px] font-bold text-slate-300 block mb-2">Modo de Vectorización:</label>
                                <div className="flex flex-col gap-1.5">
                                  {Object.values(VECTOR_PRESETS).map(preset => (
                                    <button
                                      key={preset.id}
                                      onClick={() => setVectorPreset(preset.id)}
                                      disabled={isTracing}
                                      className={`w-full text-left px-3 py-2.5 rounded-xl border transition-all ${
                                        vectorPreset === preset.id
                                          ? 'bg-amber-500/15 border-amber-500 text-amber-200 shadow-sm shadow-amber-500/20'
                                          : 'bg-slate-950 border-slate-800 text-slate-400 hover:border-slate-600 hover:text-slate-200'
                                      } ${isTracing ? 'opacity-50 cursor-wait' : 'cursor-pointer'}`}
                                    >
                                      <div className="font-bold text-[11px]">{preset.label}</div>
                                      <div className="text-[9px] mt-0.5 opacity-70">{preset.description}</div>
                                    </button>
                                  ))}
                                </div>
                              </div>

                              {/* INDICADOR DE PROGRESO DE VECTORIZACIÓN */}
                              {isTracing && (
                                <div className="flex items-center gap-2 bg-amber-500/10 border border-amber-500/30 rounded-xl px-3 py-2.5 animate-pulse">
                                  <svg className="w-4 h-4 text-amber-400 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                  </svg>
                                  <span className="text-[10px] font-bold text-amber-300">Vectorizando con motor profesional...</span>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      </div>

                      {/* CARGA DIRECTA DE ARCHIVOS SVG */}
                      <div className="border-t border-slate-800/60 pt-4 mt-4">
                        <span className="text-xs font-bold text-indigo-400 block mb-2">Subir archivo SVG (Vectores directos)</span>
                        <div className="flex flex-col gap-2">
                          <input type="file" accept=".svg" onChange={handleFileUpload} id="svg-file-picker" className="hidden" />
                          <label htmlFor="svg-file-picker" className="w-full bg-slate-900 hover:bg-slate-800 border border-slate-800 rounded-xl py-2.5 px-3 text-xs text-center font-semibold cursor-pointer transition text-slate-300 hover:text-white">
                            Cargar Archivo SVG Directo
                          </label>
                          <textarea value={customSvgInput} onChange={(e) => setCustomSvgInput(e.target.value)} placeholder="O pega el código <svg> aquí..." className="w-full h-24 bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs font-mono text-slate-300 resize-none" />
                          <button onClick={handleCustomSvgSubmit} disabled={!customSvgInput.trim()} className="bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 text-white rounded-xl py-2 px-4 text-xs font-bold transition">
                            Cargar Código Pegado
                          </button>
                        </div>
                      </div>
                    </div>

                    <div className="border-t border-slate-800/60 pt-5">
                      <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <Palette className="w-4 h-4 text-emerald-400" />
                        2. Estilo de Pizarra
                      </h2>
                      <div className="grid grid-cols-3 gap-2 flex-shrink-0">
                        {Object.values(BOARD_THEMES).map((theme) => (
                          <button key={theme.id} onClick={() => { setActiveTheme(theme); handleReset(); }} className={`p-2.5 rounded-xl border text-center text-xs font-semibold flex flex-col items-center gap-2 ${activeTheme.id === theme.id ? 'bg-emerald-600/15 border-emerald-500 text-emerald-300' : 'bg-slate-900/50 border-slate-800 text-slate-400'}`}>
                            <div className={`w-6 h-6 rounded border ${theme.bgClass}`} />
                            <span>{theme.name}</span>
                          </button>
                        ))}
                      </div>

                      {/* CONMUTADOR PARA PUNTOS */}
                      <div className="flex items-center justify-between mt-4 p-2.5 bg-slate-900 rounded-xl border border-slate-800">
                        <div className="flex flex-col">
                          <span className="text-xs font-bold text-slate-200">Ver líneas / puntos</span>
                          <span className="text-[10px] text-slate-500">Activa la cuadrícula del fondo</span>
                        </div>
                        <button
                          onClick={() => setShowGrid(!showGrid)}
                          className={`w-10 h-6 flex items-center rounded-full p-1 duration-300 cursor-pointer ${showGrid ? 'bg-emerald-500' : 'bg-slate-700'}`}
                        >
                          <div className={`bg-white w-4 h-4 rounded-full shadow-md transform duration-300 ${showGrid ? 'translate-x-4' : 'translate-x-0'}`} />
                        </button>
                      </div>

                      {/* CONMUTADOR PARA OCULTAR CURSOR DEL MOUSE */}
                      <div className="flex items-center justify-between mt-2 p-2.5 bg-slate-900 rounded-xl border border-slate-800">
                        <div className="flex flex-col">
                          <span className="text-xs font-bold text-slate-200">Ocultar cursor del mouse</span>
                          <span className="text-[10px] text-slate-500">Invisible en pantalla completa</span>
                        </div>
                        <button
                          onClick={() => setHideCursorDuringRecord(!hideCursorDuringRecord)}
                          className={`w-10 h-6 flex items-center rounded-full p-1 duration-300 cursor-pointer ${hideCursorDuringRecord ? 'bg-emerald-500' : 'bg-slate-700'}`}
                        >
                          <div className={`bg-white w-4 h-4 rounded-full shadow-md transform duration-300 ${hideCursorDuringRecord ? 'translate-x-4' : 'translate-x-0'}`} />
                        </button>
                      </div>
                    </div>

                    <div className="border-t border-slate-800/60 pt-5">
                      <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                        <Sliders className="w-4 h-4 text-amber-400" />
                        3. Estilo de Mano
                      </h2>
                      <div className="grid grid-cols-2 gap-2 mb-2">
                        <button onClick={() => setHandStyle('marker_right')} className={`py-2 px-3 rounded-lg border text-xs font-semibold transition ${handStyle === 'marker_right' ? 'bg-amber-600/15 border-amber-500 text-amber-300' : 'bg-slate-900/50 border-slate-800 text-slate-400'}`}>
                          Marcador Azul
                        </button>
                        <button onClick={() => setHandStyle('chalk')} className={`py-2 px-3 rounded-lg border text-xs font-semibold transition ${handStyle === 'chalk' ? 'bg-amber-600/15 border-amber-500 text-amber-300' : 'bg-slate-900/50 border-slate-800 text-slate-400'}`}>
                          Tiza Escolar
                        </button>
                        <button onClick={() => setHandStyle('custom_png')} className={`py-2 px-3 rounded-lg border text-xs font-semibold flex items-center justify-center gap-1.5 transition ${handStyle === 'custom_png' ? 'bg-amber-600/15 border-amber-500 text-amber-300' : 'bg-slate-900/50 border-slate-800 text-slate-400'}`}>
                          <Link2 className="w-3.5 h-3.5" />
                          Mano PNG (Git)
                        </button>
                        <button onClick={() => setHandStyle('none')} className={`py-2 px-3 rounded-lg border text-xs font-semibold transition ${handStyle === 'none' ? 'bg-amber-600/15 border-amber-500 text-amber-300' : 'bg-slate-900/50 border-slate-800 text-slate-400'}`}>
                          Sin Mano (Solo)
                        </button>
                      </div>

                      {handStyle === 'custom_png' && (
                        <div className="bg-slate-900 border border-slate-800 p-3 rounded-xl mt-3 flex flex-col gap-3 animate-fade-in">
                          <div>
                            <label className="text-[10px] font-bold text-slate-400 block mb-1">URL Raw de GitHub:</label>
                            <input type="text" value={customPngUrl} onChange={(e) => setCustomPngUrl(e.target.value)} className="w-full bg-slate-950 border border-slate-800 text-xs p-2 rounded-lg" />
                          </div>
                          <div>
                            <div className="flex justify-between text-[10px] text-slate-400 mb-1 font-bold">
                              <span>Offset X</span>
                              <span className="text-amber-400">{customPngOffsetX}px</span>
                            </div>
                            <input type="range" min="-150" max="50" value={customPngOffsetX} onChange={(e) => setCustomPngOffsetX(parseInt(e.target.value))} className="w-full accent-amber-500" />
                          </div>
                          <div>
                            <div className="flex justify-between text-[10px] text-slate-400 mb-1 font-bold">
                              <span>Offset Y</span>
                              <span className="text-amber-400">{customPngOffsetY}px</span>
                            </div>
                            <input type="range" min="-250" max="50" value={customPngOffsetY} onChange={(e) => setCustomPngOffsetY(parseInt(e.target.value))} className="w-full accent-amber-500" />
                          </div>
                        </div>
                      )}
                    </div>

                    <div className="border-t border-slate-800/60 pt-5 mt-auto">
                      <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <Settings className="w-4 h-4 text-purple-400" />
                        4. Ajustes de Trazo
                      </h2>
                      <div className="flex flex-col gap-4">
                        <div>
                          <div className="flex justify-between text-xs mb-1">
                            <span className="text-slate-400">Grosor</span>
                            <span className="font-bold text-slate-200">{strokeWidth}px</span>
                          </div>
                          <input type="range" min="1" max="8" value={strokeWidth} onChange={(e) => { setStrokeWidth(parseFloat(e.target.value)); handleReset(); }} className="w-full accent-blue-500" />
                        </div>
                        <div>
                          <div className="flex justify-between text-xs mb-1">
                            <span className="text-slate-400">Velocidad</span>
                            <span className="font-bold text-slate-200">{drawingSpeed}x</span>
                          </div>
                          <input type="range" min="0.25" max="3" step="0.25" value={drawingSpeed} onChange={(e) => setDrawingSpeed(parseFloat(e.target.value))} className="w-full" />
                        </div>
                        <div>
                          <div className="flex justify-between text-xs mb-1">
                            <span className="text-slate-400">Duración del video</span>
                            <span className="font-bold text-slate-200">{videoDurationSec}s</span>
                          </div>
                          <input type="range" min="5" max="120" step="5" value={videoDurationSec} onChange={(e) => setVideoDurationSec(parseInt(e.target.value))} className="w-full accent-blue-500" />
                          <div className="flex justify-between text-[9px] text-slate-600 mt-0.5">
                            <span>5s</span>
                            <span className="text-slate-500 italic">Auto: {Math.round(Math.max(10, Math.min(90, totalPathCount * 0.045)))}s para {totalPathCount} trazos</span>
                            <span>120s</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </section>
                )}
              </main>

              {/* MODAL DE EXPORTACIÓN DE VIDEO */}
              {isExporting && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center z-50 animate-fade-in">
                  <div className="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-md w-full shadow-2xl flex flex-col items-center text-center gap-6">
                    <div className="relative flex items-center justify-center">
                      <svg className="w-24 h-24 transform -rotate-90">
                        <circle cx="48" cy="48" r="40" stroke="#1e293b" strokeWidth="6" fill="transparent" />
                        <circle cx="48" cy="48" r="40" stroke="url(#progressGrad)" strokeWidth="6" fill="transparent"
                                strokeDasharray={2 * Math.PI * 40}
                                strokeDashoffset={2 * Math.PI * 40 * (1 - exportProgress / 100)}
                                strokeLinecap="round" />
                        <defs>
                          <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor="#a855f7" />
                            <stop offset="100%" stopColor="#6366f1" />
                          </linearGradient>
                        </defs>
                      </svg>
                      <span className="absolute text-lg font-black text-white font-mono">{exportProgress}%</span>
                    </div>

                    <div className="flex flex-col gap-2">
                      <h3 className="text-lg font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-200 uppercase">
                        {exportMode === 'offline' ? 'Exportación Rápida HD' : 'Grabación con Audio HD'}
                      </h3>
                      <p className="text-xs font-semibold text-slate-400 font-mono leading-relaxed h-10 flex items-center justify-center">
                        {exportStatusText}
                      </p>
                    </div>

                    <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                      <div className="bg-gradient-to-r from-purple-500 to-indigo-500 h-full rounded-full transition-all duration-300" style={{ width: `${exportProgress}%` }} />
                    </div>

                    <div className="text-[10px] text-slate-500 text-left border-l-2 border-indigo-500/50 pl-3 italic">
                      {exportMode === 'offline' 
                        ? "Este modo es ultra rápido y rinde a 1080p directamente en tu memoria sin esperas (sin sonido)."
                        : "Este modo graba el lienzo y el audio procedimental segundo a segundo. Por favor, mantén la pestaña activa."}
                    </div>

                    <button 
                      onClick={handleCancelExport}
                      className="px-6 py-2.5 bg-red-600/10 hover:bg-red-600/20 text-red-400 rounded-xl text-xs font-bold border border-red-500/20 hover:border-red-500/40 transition active:scale-95 mt-2"
                    >
                      Cancelar Exportación
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
