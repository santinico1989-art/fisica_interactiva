        // ==========================================

        const IDEA_SVG = `<svg viewBox="0 0 100 100" class="w-full h-full" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">

        // ==========================================
        // PROCESADO DE ESTILOS DE PIZARRA
        // ==========================================
        const BOARD_THEMES = {

        // ==========================================
        // SINTETIZADOR DE AUDIO PROCEDURAL (Scribble)
        // ==========================================
        class SoundSynth {
          constructor() {
            this.ctx = null;
            this.noise = null;
            this.filter = null;
            this.gainNode = null;
            this.isActive = false;
          }

          init() {
            if (this.ctx) return;
            try {
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              this.ctx = new AudioContext();

              const bufferSize = 2 * this.ctx.sampleRate;
              const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
              const output = noiseBuffer.getChannelData(0);
              for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
              }

              this.noise = this.ctx.createBufferSource();
              this.noise.buffer = noiseBuffer;
              this.noise.loop = true;

              this.filter = this.ctx.createBiquadFilter();
              this.filter.type = 'bandpass';
              this.filter.frequency.value = 1200; 
              this.filter.Q.value = 2.5;

              this.gainNode = this.ctx.createGain();
              this.gainNode.gain.value = 0;

              this.noise.connect(this.filter);
              this.filter.connect(this.gainNode);
              this.gainNode.connect(this.ctx.destination);

              this.noise.start(0);
              this.isActive = true;
            } catch (e) {
              console.error("Web Audio API no soportada en este navegador", e);
            }
          }

          configureTheme(themeId) {
            if (!this.ctx || !this.isActive) return;
            if (themeId === 'chalkboard') {
              this.filter.frequency.value = 750;
              this.filter.Q.value = 4.0;
            } else {
              this.filter.frequency.value = 1300;
              this.filter.Q.value = 2.0;
            }
          }

          setDrawingSpeed(speedFactor, strokeWidth) {
            if (!this.ctx || !this.isActive) return;
            if (this.ctx.state === 'suspended') {
              this.ctx.resume();
            }
            const targetGain = Math.min(0.04 + (speedFactor * 0.05) + (strokeWidth * 0.01), 0.15);
            const targetFreq = 1000 + (speedFactor * 400);

            this.gainNode.gain.setTargetAtTime(targetGain, this.ctx.currentTime, 0.05);
            this.filter.frequency.setTargetAtTime(targetFreq, this.ctx.currentTime, 0.08);
          }

          silence() {
            if (this.gainNode) {
              this.gainNode.gain.setTargetAtTime(0, this.ctx.currentTime, 0.03);
            }
          }
        }

        const synthInstance = new SoundSynth();

        const getComputedStyleValue = (p, prop) => {
          // Primero: estilos inline del elemento
          if (p.style && p.style[prop]) return p.style[prop];
          // Segundo: atributo directo del elemento
          const attr = p.getAttribute(prop);
          if (attr && attr !== 'inherit') return attr;
          // Tercero: heredar del padre (grupos <g>, etc.)
          let current = p.parentNode;
          while (current && current.tagName && current.tagName.toLowerCase() !== 'svg') {
            if (current.style && current.style[prop]) return current.style[prop];
            const parentAttr = current.getAttribute(prop);  // BUG FIXED: era 'parentAttr' (var no definida)
            if (parentAttr && parentAttr !== 'inherit') return parentAttr;
            current = current.parentNode;
          }
          return null;
        };

        // ==========================================
        // CONVERTIDOR DE PRIMITIVAS VECTORIALES A PATHS
        // ==========================================
        const convertSvgShapesToPaths = (doc) => {
          doc.querySelectorAll('circle').forEach(circle => {
            const cx = parseFloat(circle.getAttribute('cx') || 0);
            const cy = parseFloat(circle.getAttribute('cy') || 0);
            const r = parseFloat(circle.getAttribute('r') || 0);
            const d = 'M ' + (cx - r) + ' ' + cy + ' a ' + r + ' ' + r + ' 0 1 0 ' + (r * 2) + ' 0 a ' + r + ' ' + r + ' 0 1 0 ' + (-r * 2) + ' 0';
            replaceElementWithPath(doc, circle, d);
          });

          doc.querySelectorAll('rect').forEach(rect => {
            const x = parseFloat(rect.getAttribute('x') || 0);
            const y = parseFloat(rect.getAttribute('y') || 0);
            const w = parseFloat(rect.getAttribute('width') || 0);
            const h = parseFloat(rect.getAttribute('height') || 0);
            const rx = parseFloat(rect.getAttribute('rx') || 0);
            const ry = parseFloat(rect.getAttribute('ry') || 0);
            let d = '';
            if (rx > 0 || ry > 0) {
              const rX = rx || ry;
              const rY = ry || rx;
              d = 'M ' + (x + rX) + ' ' + y + ' L ' + (x + w - rX) + ' ' + y + ' A ' + rX + ' ' + rY + ' 0 0 1 ' + (x + w) + ' ' + (y + rY) + ' L ' + (x + w) + ' ' + (y + h - rY) + ' A ' + rX + ' ' + rY + ' 0 0 1 ' + (x + w - rX) + ' ' + (y + h) + ' L ' + (x + rX) + ' ' + (y + h) + ' A ' + rX + ' ' + rY + ' 0 0 1 ' + x + ' ' + (y + h - rY) + ' L ' + x + ' ' + (y + rY) + ' A ' + rX + ' ' + rY + ' 0 0 1 ' + (x + rX) + ' ' + y + ' Z';
            } else {
              d = 'M ' + x + ' ' + y + ' L ' + (x + w) + ' ' + y + ' L ' + (x + w) + ' ' + (y + h) + ' L ' + x + ' ' + (y + h) + ' Z';
            }
            replaceElementWithPath(doc, rect, d);
          });

          doc.querySelectorAll('line').forEach(line => {
            const x1 = line.getAttribute('x1') || 0;
            const y1 = line.getAttribute('y1') || 0;
            const x2 = line.getAttribute('x2') || 0;
            const y2 = line.getAttribute('y2') || 0;
            const d = 'M ' + x1 + ' ' + y1 + ' L ' + x2 + ' ' + y2;
            replaceElementWithPath(doc, line, d);
          });

          doc.querySelectorAll('polyline').forEach(polyline => {
            const points = polyline.getAttribute('points') || '';
            const coords = points.trim().split(/[\s,]+/);
            if (coords.length >= 2) {
              let d = 'M ' + coords[0] + ' ' + coords[1];
              for (let i = 2; i < coords.length; i += 2) {
                if (coords[i] && coords[i+1]) d += ' L ' + coords[i] + ' ' + coords[i+1];
              }
              replaceElementWithPath(doc, polyline, d);
            }
          });

          doc.querySelectorAll('polygon').forEach(polygon => {
            const points = polygon.getAttribute('points') || '';
            const coords = points.trim().split(/[\s,]+/);
            if (coords.length >= 2) {
              let d = 'M ' + coords[0] + ' ' + coords[1];
              for (let i = 2; i < coords.length; i += 2) {
                if (coords[i] && coords[i+1]) d += ' L ' + coords[i] + ' ' + coords[i+1];
              }
              d += ' Z';
              replaceElementWithPath(doc, polygon, d);
            }
          });
        };

        const replaceElementWithPath = (doc, el, d) => {
          const path = doc.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', d);
          for (let i = 0; i < el.attributes.length; i++) {
            const attr = el.attributes[i];
            if (!['d', 'x', 'y', 'width', 'height', 'cx', 'cy', 'r', 'rx', 'ry', 'points', 'x1', 'y1', 'x2', 'y2'].includes(attr.name)) {
              path.setAttribute(attr.name, attr.value);
            }
          }
          el.parentNode.replaceChild(path, el);
        };

        // =========================================================================
        // PRECARGA DE IMAGETRACER — descarga la fuente al inicio para inyectarla
        // directamente en el Web Worker (evita CORS y evita congelar la página)
        // =========================================================================
        let _itSourcePromise = null;
        const _preloadImageTracerSource = () => {
          if (_itSourcePromise) return _itSourcePromise;
          _itSourcePromise = fetch('https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js')
            .then(r => r.ok ? r.text() : null)
            .catch(() => null);
          return _itSourcePromise;
        };
        // Iniciar la descarga inmediatamente al cargar la página
        _preloadImageTracerSource();

            potrace: { turdsize: 1, alphamax: 1.3, opttolerance: 0.4, threshold: 160 },
            imagetracer: null,
          },
          color: {
            id: 'color',
            label: '🎨 Color Original',
            description: 'Vectoriza preservando los colores principales de la imagen',
            colorMode: 'color',
            resolution: 480,
            potrace: null,
            imagetracer: { numberofcolors: 12, colorquantcycles: 1, pathomit: 10, ltres: 1.5, qtres: 1.5, roundcoords: 2 },
          },
          detail: {
            id: 'detail',
            label: '🔍 Máximo Detalle',
            description: 'Alta fidelidad para ilustraciones complejas',
            colorMode: 'color',
            resolution: 640,
            potrace: null,
            imagetracer: { numberofcolors: 20, colorquantcycles: 2, pathomit: 6, ltres: 1, qtres: 1, roundcoords: 1 },
          },
          fast: {
            id: 'fast',
            label: '⚡ Vista Previa',
            description: 'Conversión rápida para previsualizar el resultado',
            colorMode: 'monochrome',
            resolution: 320,
            potrace: { turdsize: 4, alphamax: 0.8, opttolerance: 0.5, threshold: 128 },
            imagetracer: null,
          },
        };

        // =========================================================================
        // HELPER: Ejecuta ImageTracer en un Web Worker con fuente INLINE
        // (sin importScripts, sin CORS, completamente fuera del hilo principal)
        // =========================================================================
        const runImageTracerInWorker = (imgData, w, h, opts, itSource) => {
          return new Promise((resolve) => {
            // Código del handler del worker — se pega DESPUÉS del source de ImageTracer
            const handlerCode = `
;self.onmessage = function(ev) {
  try {
    var d = ev.data;
    var arr = new Uint8ClampedArray(d.buffer);
    var idata = new ImageData(arr, d.w, d.h);
    var svg = ImageTracer.imagedataToSVG(idata, d.opts);
    self.postMessage({ ok: true, svg: svg });
  } catch(err) {
    self.postMessage({ ok: false, msg: String(err) });
  }
};`;

            let blobUrl;
            try {
              // Inyectar fuente completa de ImageTracer en el blob — sin importScripts
              blobUrl = URL.createObjectURL(
                new Blob([itSource + handlerCode], { type: 'application/javascript' })
              );
              const worker = new Worker(blobUrl);

              const tid = setTimeout(() => {
                worker.terminate();
                URL.revokeObjectURL(blobUrl);
                resolve(null); // señal de timeout → fallback externo
              }, 10000);

              worker.onmessage = (ev) => {
                clearTimeout(tid);
                worker.terminate();
                URL.revokeObjectURL(blobUrl);
                resolve(ev.data.ok ? ev.data.svg : null);
              };

              worker.onerror = () => {
                clearTimeout(tid);
                try { worker.terminate(); } catch(e) {}
                try { URL.revokeObjectURL(blobUrl); } catch(e) {}
                resolve(null);
              };

              // Transferir buffer de píxeles al worker (zero-copy)
              const buf = imgData.data.buffer.slice(0);
              worker.postMessage({ buffer: buf, w, h, opts }, [buf]);

        // =========================================================================
        // MOTOR PROFESIONAL DE VECTORIZACIÓN — VERSIÓN ASYNC
        // Usa Potrace (B&N) o ImageTracerJS (color) en worker off-thread.
        // =========================================================================
        const vectorizeImageAsync = async (imgElement, preset) => {
          const { colorMode, resolution, potrace: potraceOpts, imagetracer: itOpts } = preset;

          // Preparar canvas con la resolución del preset
          const canvas = document.createElement('canvas');
          let w = imgElement.naturalWidth || imgElement.width || 300;
          let h = imgElement.naturalHeight || imgElement.height || 300;
          if (w > resolution || h > resolution) {
            if (w > h) { h = Math.round((h * resolution) / w); w = resolution; }
            else { w = Math.round((w * resolution) / h); h = resolution; }
          }
          canvas.width = w;
          canvas.height = h;
          const ctx2d = canvas.getContext('2d');
          ctx2d.drawImage(imgElement, 0, 0, w, h);

          // ── MOTOR COLOR: ImageTracerJS vía Worker inline ──────────────────────
          if (colorMode === 'color') {
            const imgData = ctx2d.getImageData(0, 0, w, h);
            const opts = itOpts || { numberofcolors: 16, colorquantcycles: 2, pathomit: 8, ltres: 1, qtres: 1, roundcoords: 2 };

            // Obtener la fuente pre-descargada (no bloquea — ya es una Promise resuelta)
            const itSource = await _preloadImageTracerSource();

            if (itSource) {
              // Ruta principal: Web Worker con fuente inline (sin CORS, sin bloqueo)
              const rawSvg = await runImageTracerInWorker(imgData, w, h, opts, itSource);
              if (rawSvg) {
                return rawSvg
                  .replace(/<svg /gi, `<svg preserveAspectRatio="xMidYMid meet" `)
                  .replace(/<path /g, `<path class="doodle-path" `);
              }
            }

            // Fallback: ImageTracer en hilo principal (sólo si worker no disponible)
            if (typeof ImageTracer !== 'undefined') {
              try {
                const rawSvg = ImageTracer.imagedataToSVG(imgData, opts);
                return rawSvg
                  .replace(/<svg /gi, `<svg preserveAspectRatio="xMidYMid meet" `)
                  .replace(/<path /g, `<path class="doodle-path" `);
              } catch(e) {
                console.warn('ImageTracer síncrono falló:', e);
              }
            }

            return fallbackVectorize(imgData, w, h, preset);
          }

          // ── MOTOR MONOCROMÁTICO: Potrace-plus ──────────────────────────────
          if (colorMode === 'monochrome' && typeof Potrace !== 'undefined') {
            return new Promise((resolve) => {
              try {
                const opts = {
                  turdsize: potraceOpts?.turdsize ?? 2,
                  alphamax: potraceOpts?.alphamax ?? 1.0,
                  opttolerance: potraceOpts?.opttolerance ?? 0.2,
                  threshold: potraceOpts?.threshold ?? 128,
                  svgWidth: w,
                  svgHeight: h,
                };

                // potrace-plus acepta un canvas element directamente
                Potrace.loadCanvas(canvas);
                Potrace.setParameters(opts);
                Potrace.process(() => {
                  try {
                    let svgStr = Potrace.getSVG(1);
                    // Asegurar que tiene viewBox correcto
                    if (!svgStr.includes('viewBox')) {
                      svgStr = svgStr.replace('<svg', `<svg viewBox="0 0 ${w} ${h}"`);
                    }
                    // Asegurar preserveAspectRatio y clases animables
                    svgStr = svgStr
                      .replace(/<svg /gi, `<svg preserveAspectRatio="xMidYMid meet" width="100%" height="100%" `)
                      .replace(/<path /g, `<path class="doodle-path" `);
                    resolve(svgStr);
                  } catch (err) {
                    console.warn('Potrace getSVG falló:', err);
                    resolve(fallbackVectorize(ctx2d.getImageData(0, 0, w, h), w, h, preset));
                  }
                });
              } catch (e) {
                console.warn('Potrace no disponible o falló, usando fallback:', e);
                resolve(fallbackVectorize(ctx2d.getImageData(0, 0, w, h), w, h, preset));
              }
            });
          }

          // ── FALLBACK: Algoritmo propio ─────────────────────────────────────
          const imgData = ctx2d.getImageData(0, 0, w, h);
          return Promise.resolve(fallbackVectorize(imgData, w, h, preset));
        };

        // =========================================================================
        // FALLBACK: Algoritmo interno (Zhang-Suen + pixel-walk) — se usa sólo si
        // los motores profesionales no están disponibles.
        // =========================================================================
        const fallbackVectorize = (imageData, w, h, preset) => {
          const threshold = preset?.potrace?.threshold ?? 128;
          const data = imageData.data;
          const gray = new Float32Array(w * h);
          for (let i = 0; i < data.length; i += 4) {
            const alpha = data[i + 3] / 255;
            const r = data[i] * alpha + 255 * (1 - alpha);
            const g = data[i + 1] * alpha + 255 * (1 - alpha);
            const b = data[i + 2] * alpha + 255 * (1 - alpha);
            gray[i / 4] = 0.299 * r + 0.587 * g + 0.114 * b;
          }

          // Box blur básico para ruido
          const blurGray = (gd, bw, bh, r) => {
            if (r <= 0) return gd;
            const temp = new Float32Array(bw * bh);
            const sz = r + r + 1;
            for (let y = 0; y < bh; y++) {
              let sum = 0;
              const ro = y * bw;
              for (let x = -r; x <= r; x++) sum += gd[ro + Math.min(bw - 1, Math.max(0, x))];
              for (let x = 0; x < bw; x++) {
                temp[ro + x] = sum / sz;
                sum += gd[ro + Math.min(bw - 1, x + r + 1)] - gd[ro + Math.max(0, x - r)];
              }
            }
            for (let x = 0; x < bw; x++) {
              let sum = 0;
              for (let y = -r; y <= r; y++) sum += temp[Math.min(bh - 1, Math.max(0, y)) * bw + x];
              for (let y = 0; y < bh; y++) {
                gd[y * bw + x] = sum / sz;
                sum += temp[Math.min(bh - 1, y + r + 1) * bw + x] - temp[Math.max(0, y - r) * bw + x];
              }
            }
            return gd;
          };
          blurGray(gray, w, h, 1);

          // Binarización simple
          const binary = new Uint8Array(w * h);
          for (let i = 0; i < gray.length; i++) binary[i] = gray[i] < threshold ? 1 : 0;

          // Extraer paths simples con líneas
          const visited = new Uint8Array(w * h);
          const paths = [];
          for (let y = 1; y < h - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
              const idx = y * w + x;
              if (binary[idx] && !visited[idx]) {
                const path = [];
                let cx = x, cy = y;
                path.push({ x: cx, y: cy });
                visited[idx] = 1;
                for (let step = 0; step < 2000; step++) {
                  let found = false;
                  for (let dy = -1; dy <= 1 && !found; dy++) {
                    for (let dx = -1; dx <= 1 && !found; dx++) {
                      if (!dx && !dy) continue;
                      const nx = cx + dx, ny = cy + dy;
                      const ni = ny * w + nx;
                      if (nx >= 0 && nx < w && ny >= 0 && ny < h && binary[ni] && !visited[ni]) {
                        cx = nx; cy = ny;
                        path.push({ x: cx, y: cy });
                        visited[ni] = 1;
                        found = true;
                      }
                    }
                  }
                  if (!found) break;
                }
                if (path.length >= 4) paths.push(path);
              }
            }
          }

          let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">\n`;
          paths.forEach(p => {
            if (p.length < 2) return;
            let d = `M ${p[0].x.toFixed(1)} ${p[0].y.toFixed(1)}`;
            for (let i = 1; i < p.length; i++) d += ` L ${p[i].x.toFixed(1)} ${p[i].y.toFixed(1)}`;
            svg += `  <path class="doodle-path" d="${d}" />\n`;
          });
          svg += `</svg>`;
          return svg;
        };


        const zhangSuenThinning = (binaryGrid, width, height) => {
          let changed = true;
          const grid = new Uint8Array(binaryGrid);
          const toDelete = [];
          let iterations = 0;
          const maxIterations = 50; 

          const getVal = (x, y) => {
            if (x < 0 || x >= width || y < 0 || y >= height) return 0;
            return grid[y * width + x];
          };

          while (changed && iterations < maxIterations) {
            changed = false;
            iterations++;

            // Paso 1
            toDelete.length = 0;
            for (let y = 1; y < height - 1; y++) {
              for (let x = 1; x < width - 1; x++) {
                const idx = y * width + x;
                if (grid[idx] === 0) continue;

                // Vecinos de Moore
                const p2 = getVal(x, y - 1);
                const p3 = getVal(x + 1, y - 1);
                const p4 = getVal(x + 1, y);
                const p5 = getVal(x + 1, y + 1);
                const p6 = getVal(x, y + 1);
                const p7 = getVal(x - 1, y + 1);
                const p8 = getVal(x - 1, y);
                const p9 = getVal(x - 1, y - 1);

                const A = ((p2 === 0 && p3 === 1) ? 1 : 0) +
                          ((p3 === 0 && p4 === 1) ? 1 : 0) +
                          ((p4 === 0 && p5 === 1) ? 1 : 0) +
                          ((p5 === 0 && p6 === 1) ? 1 : 0) +
                          ((p6 === 0 && p7 === 1) ? 1 : 0) +
                          ((p7 === 0 && p8 === 1) ? 1 : 0) +
                          ((p8 === 0 && p9 === 1) ? 1 : 0) +
                          ((p9 === 0 && p2 === 1) ? 1 : 0);

                const B = p2 + p3 + p4 + p5 + p6 + p7 + p8 + p9;

                if (B >= 2 && B <= 6 && A === 1) {
                  if (p2 * p4 * p6 === 0 && p4 * p6 * p8 === 0) {
                    toDelete.push(idx);
                  }
                }
              }
            }
            for (let i = 0; i < toDelete.length; i++) {
              grid[toDelete[i]] = 0;
              changed = true;
            }

            // Paso 2
            toDelete.length = 0;
            for (let y = 1; y < height - 1; y++) {
              for (let x = 1; x < width - 1; x++) {
                const idx = y * width + x;
                if (grid[idx] === 0) continue;

                const p2 = getVal(x, y - 1);
                const p3 = getVal(x + 1, y - 1);
                const p4 = getVal(x + 1, y);
                const p5 = getVal(x + 1, y + 1);
                const p6 = getVal(x, y + 1);
                const p7 = getVal(x - 1, y + 1);
                const p8 = getVal(x - 1, y);
                const p9 = getVal(x - 1, y - 1);

                const A = ((p2 === 0 && p3 === 1) ? 1 : 0) +
                          ((p3 === 0 && p4 === 1) ? 1 : 0) +
                          ((p4 === 0 && p5 === 1) ? 1 : 0) +
                          ((p5 === 0 && p6 === 1) ? 1 : 0) +
                          ((p6 === 0 && p7 === 1) ? 1 : 0) +
                          ((p7 === 0 && p8 === 1) ? 1 : 0) +
                          ((p8 === 0 && p9 === 1) ? 1 : 0) +
                          ((p9 === 0 && p2 === 1) ? 1 : 0);

                const B = p2 + p3 + p4 + p5 + p6 + p7 + p8 + p9;

                if (B >= 2 && B <= 6 && A === 1) {
                  if (p2 * p4 * p8 === 0 && p2 * p6 * p8 === 0) {
                    toDelete.push(idx);
                  }
                }
              }
            }
            for (let i = 0; i < toDelete.length; i++) {
              grid[toDelete[i]] = 0;
              changed = true;
            }
          }
          return grid;
        };

        // ==========================================
        // EXTRACCIÓN Y TRACE DE VECTORES DE UN SKELETON
        // ==========================================
        const extractPathsFromBinary = (binaryGrid, width, height, minLength, simplification) => {
          const visited = new Uint8Array(width * height);
          const paths = [];

          const findNextNeighbor = (x, y) => {
            for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                if (dx === 0 && dy === 0) continue;
                const nx = x + dx;
                const ny = y + dy;
                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                  const nidx = ny * width + nx;
                  if (binaryGrid[nidx] === 1 && visited[nidx] === 0) {
                    return { x: nx, y: ny, idx: nidx };
                  }
                }
              }
            }
            for (let dy = -2; dy <= 2; dy++) {
              for (let dx = -2; dx <= 2; dx++) {
                if (Math.abs(dx) <= 1 && Math.abs(dy) <= 1) continue;
                const nx = x + dx;
                const ny = y + dy;
                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                  const nidx = ny * width + nx;
                  if (binaryGrid[nidx] === 1 && visited[nidx] === 0) {
                    return { x: nx, y: ny, idx: nidx };
                  }
                }
              }
            }
            return null;
          };

          for (let y = 1; y < height - 1; y++) {
            for (let x = 1; x < width - 1; x++) {
              const idx = y * width + x;
              if (binaryGrid[idx] === 1 && visited[idx] === 0) {
                const path = [];
                let cx = x;
                let cy = y;
                path.push({ x: cx, y: cy });
                visited[idx] = 1;

                let tracing = true;
                while (tracing) {
                  const next = findNextNeighbor(cx, cy);
                  if (next) {
                    cx = next.x;
                    cy = next.y;
                    path.push({ x: cx, y: cy });
                    visited[next.idx] = 1;
                  } else {
                    tracing = false;
                  }
                }

                if (path.length >= minLength) {
                  const simplified = [];
                  for (let i = 0; i < path.length; i += simplification) {
                    simplified.push(path[i]);
                  }
                  if (path.length > 1 && (path.length - 1) % simplification !== 0) {
                    simplified.push(path[path.length - 1]);
                  }
                  paths.push(simplified);
                }
              }
            }
          }
          return paths;
        };

        // ==========================================================
        // ALGORITMOS DE SUAVIZADO Y SIMPLIFICACIÓN VECTORIAL
        // ==========================================================
        const boxBlurGrayscale = (gray, width, height, radius) => {
          if (radius <= 0) return gray;
          const temp = new Float32Array(width * height);
          const size = radius + radius + 1;
          
          // Barrido horizontal
          for (let y = 0; y < height; y++) {
            let sum = 0;
            const rowOffset = y * width;
            for (let x = -radius; x <= radius; x++) {
              const clampedX = Math.min(width - 1, Math.max(0, x));
              sum += gray[rowOffset + clampedX];
            }
            for (let x = 0; x < width; x++) {
              temp[rowOffset + x] = sum / size;
              const nextX = x + radius + 1;
              const prevX = x - radius;
              const clampedNextX = Math.min(width - 1, Math.max(0, nextX));
              const clampedPrevX = Math.min(width - 1, Math.max(0, prevX));
              sum += gray[rowOffset + clampedNextX] - gray[rowOffset + clampedPrevX];
            }
          }
          
          // Barrido vertical
          for (let x = 0; x < width; x++) {
            let sum = 0;
            for (let y = -radius; y <= radius; y++) {
              const clampedY = Math.min(height - 1, Math.max(0, y));
              sum += temp[clampedY * width + x];
            }
            for (let y = 0; y < height; y++) {
              gray[y * width + x] = sum / size;
              const nextY = y + radius + 1;
              const prevY = y - radius;
              const clampedNextY = Math.min(height - 1, Math.max(0, nextY));
              const clampedPrevY = Math.min(height - 1, Math.max(0, prevY));
              sum += temp[clampedNextY * width + x] - temp[clampedPrevY * width + x];
            }
          }
          return gray;
        };

        const smoothPathPoints = (points, windowSize = 3) => {
          if (points.length <= 2) return points;
          const smoothed = [];
          const half = Math.floor(windowSize / 2);
          for (let i = 0; i < points.length; i++) {
            let sumX = 0;
            let sumY = 0;
            let count = 0;
            for (let w = -half; w <= half; w++) {
              const idx = i + w;
              if (idx >= 0 && idx < points.length) {
                sumX += points[idx].x;
                sumY += points[idx].y;
                count++;
              }
            }
            smoothed.push({ x: sumX / count, y: sumY / count });
          }
          return smoothed;
        };

        const simplifyDouglasPeucker = (points, tolerance) => {
          if (points.length <= 2) return points;
          const getSqSegDist = (p, p1, p2) => {
            let x = p1.x, y = p1.y, dx = p2.x - x, dy = p2.y - y;
            if (dx !== 0 || dy !== 0) {
              const t = ((p.x - x) * dx + (p.y - y) * dy) / (dx * dx + dy * dy);
              if (t > 1) {
                x = p2.x; y = p2.y;
              } else if (t > 0) {
                x += dx * t; y += dy * t;
              }
            }
            dx = p.x - x; dy = p.y - y;
            return dx * dx + dy * dy;
          };
          const simplifyStep = (pts, first, last, sqTol, result) => {
            let maxSqDist = sqTol;
            let index = -1;
            for (let i = first + 1; i < last; i++) {
              const sqDist = getSqSegDist(pts[i], pts[first], pts[last]);
              if (sqDist > maxSqDist) {
                index = i;
                maxSqDist = sqDist;
              }
            }
            if (maxSqDist > sqTol) {
              if (index - first > 1) simplifyStep(pts, first, index, sqTol, result);
              result.push(pts[index]);
              if (last - index > 1) simplifyStep(pts, index, last, sqTol, result);
            }
          };
          const sqTolerance = tolerance * tolerance;
          const last = points.length - 1;
          const result = [points[0]];
          simplifyStep(points, 0, last, sqTolerance, result);
          result.push(points[last]);
          return result;
        };

        // ==========================================================
        // CONVERTIDOR MEJORADO RÁSTER A SVG CON SKELETONIZER
        // ==========================================================
        const traceImageToSvgPaths = (imageData, threshold, minPathLength, simplification, mode, invert, blurRadius = 1, smoothRadius = 1, colorMode = 'monochrome') => {
          const width = imageData.width;
          const height = imageData.height;
          const data = imageData.data;

          const gray = new Float32Array(width * height);
          for (let i = 0; i < data.length; i += 4) {
            const alpha = data[i + 3] / 255;
            const r = data[i] * alpha + 255 * (1 - alpha);
            const g = data[i + 1] * alpha + 255 * (1 - alpha);
            const b = data[i + 2] * alpha + 255 * (1 - alpha);
            gray[i / 4] = 0.299 * r + 0.587 * g + 0.114 * b;
          }

          // Aplicar filtro de desenfoque previo para eliminar ruido digital
          if (blurRadius > 0) {
            boxBlurGrayscale(gray, width, height, blurRadius);
          }

          const binaryGrid = new Uint8Array(width * height);

          if (mode === 'text') {
            for (let idx = 0; idx < gray.length; idx++) {
              const val = gray[idx];
              if (invert) {
                binaryGrid[idx] = val > threshold ? 1 : 0;
              } else {
                binaryGrid[idx] = val < threshold ? 1 : 0;
              }
            }
          } else {
            const edges = new Uint8Array(width * height);
            for (let y = 1; y < height - 1; y++) {
              for (let x = 1; x < width - 1; x++) {
                const idx = y * width + x;

                const gx =
                  -1 * gray[(y - 1) * width + (x - 1)] + 1 * gray[(y - 1) * width + (x + 1)] +
                  -2 * gray[y * width + (x - 1)]       + 2 * gray[y * width + (x + 1)] +
                  -1 * gray[(y + 1) * width + (x - 1)] + 1 * gray[(y + 1) * width + (x + 1)];

                const gy =
                  -1 * gray[(y - 1) * width + (x - 1)] - 2 * gray[(y - 1) * width + x] - 1 * gray[(y - 1) * width + (x + 1)] +
                  1 * gray[(y + 1) * width + (x - 1)] + 2 * gray[(y + 1) * width + x] + 1 * gray[(y + 1) * width + (x + 1)];

                const mag = Math.sqrt(gx * gx + gy * gy);
                if (invert) {
                  edges[idx] = mag < threshold ? 1 : 0;
                } else {
                  edges[idx] = mag > threshold ? 1 : 0;
                }
              }
            }
            binaryGrid.set(edges);
          }

          const skeletonGrid = zhangSuenThinning(binaryGrid, width, height);
          
          // Extracción y refinamiento de trazos vectoriales
          const rawPaths = extractPathsFromBinary(skeletonGrid, width, height, minPathLength, 1);
          const paths = [];

          rawPaths.forEach(path => {
            if (path.length >= minPathLength) {
              // 1. Suavizar trazo para mitigar el efecto de pixelado/escalera
              let processed = path;
              if (smoothRadius > 0) {
                processed = smoothPathPoints(path, smoothRadius * 2 + 1);
              }
              // 2. Simplificar trazos con Ramer-Douglas-Peucker (tolerancia proporcional)
              const tolerance = simplification * 0.35;
              processed = simplifyDouglasPeucker(processed, tolerance);

              if (processed.length >= 2) {
                paths.push(processed);
              }
            }
          });

          let svg = `<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">\n`;
          paths.forEach(p => {
            if (p.length < 2) return;
            let d = `M ${p[0].x.toFixed(1)} ${p[0].y.toFixed(1)}`;
            for (let i = 1; i < p.length; i++) {
              d += ` L ${p[i].x.toFixed(1)} ${p[i].y.toFixed(1)}`;
            }
            
            let strokeAttr = 'stroke="currentColor"';
            if (colorMode === 'color') {
              // Muestrear el color del píxel de la imagen original en el punto medio del path
              const midIdx = Math.floor(p.length / 2);
              const samplePoint = p[midIdx] || p[0];
              const sampleX = Math.min(width - 1, Math.max(0, Math.round(samplePoint.x)));
              const sampleY = Math.min(height - 1, Math.max(0, Math.round(samplePoint.y)));
              const pixelIdx = (sampleY * width + sampleX) * 4;
              const r = data[pixelIdx];
              const g = data[pixelIdx + 1];
              const b = data[pixelIdx + 2];
              const hexColor = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
              strokeAttr = `stroke="${hexColor}" data-color-stroke="${hexColor}"`;
            }
            
            svg += `  <path class="doodle-path" d="${d}" ${strokeAttr} />\n`;
          });
          svg += `</svg>`;
          return svg;
        };        

        const DEFAULT_MARKER_HAND_PNG = "hand_marker.png";
        const defaultMarkerHandImg = { img: null, loaded: false };
        if (typeof Image !== 'undefined') {
          defaultMarkerHandImg.img = new Image();
          defaultMarkerHandImg.img.src = DEFAULT_MARKER_HAND_PNG;
          defaultMarkerHandImg.img.onload = () => {
            defaultMarkerHandImg.loaded = true;
          };
        }

        // ==========================================
        // COMPONENTE PRINCIPAL (React)
        // ==========================================
        function App() {
          const [selectedTemplate, setSelectedTemplate] = useState('idea');
          const [activeTheme, setActiveTheme] = useState(BOARD_THEMES.whiteboard);
          const [handStyle, setHandStyle] = useState('marker_right'); 
          const [customStroke, setCustomStroke] = useState('');
          const [customSvgInput, setCustomSvgInput] = useState('');
          const [parsedCustomSvg, setParsedCustomSvg] = useState(null);
          const [activeSvgString, setActiveSvgString] = useState(IDEA_SVG);
          
          const [drawingSpeed, setDrawingSpeed] = useState(1.25); 
          const [strokeWidth, setStrokeWidth] = useState(2.5);
          const [isSoundEnabled, setIsSoundEnabled] = useState(false); 
          const [showParticles, setShowParticles] = useState(true);

          // Estado de Visualización de cuadrícula / puntos
          const [showGrid, setShowGrid] = useState(true);
          const [hideCursorDuringRecord, setHideCursorDuringRecord] = useState(false);

          // Estado de Pantalla Completa y Grabación
          const [isFullscreen, setIsFullscreen] = useState(false);
          const [showOverlayControls, setShowOverlayControls] = useState(true);

          // PNG de mano personalizada
          const [customPngUrl, setCustomPngUrl] = useState('https://images.rawpixel.com/image_png_1100/rawpixel-item-6330089-png.png'); 
          const [customPngOffsetX, setCustomPngOffsetX] = useState(-15);
          const [customPngOffsetY, setCustomPngOffsetY] = useState(-105);

          // Estados para la conversión mejorada de imágenes
          const [uploadedImageSrc, setUploadedImageSrc] = useState(null);
          const [imgElement, setImgElement] = useState(null);
          const [isTracing, setIsTracing] = useState(false); // Indicador de vectorización en progreso
          // Preset activo de vectorización (id de VECTOR_PRESETS)
          const [vectorPreset, setVectorPreset] = useState('logo');
          // colorMode derivado del preset activo (para compatibilidad con código de exportación)
          const colorMode = VECTOR_PRESETS[vectorPreset]?.colorMode ?? 'monochrome';

          // Estados para la exportación de video
          const [isExporting, setIsExporting] = useState(false);
          const [exportProgress, setExportProgress] = useState(0);
          const [exportMode, setExportMode] = useState('offline'); // 'offline' o 'realtime'
          const [exportStatusText, setExportStatusText] = useState('');
          const exportCancelledRef = useRef(false);
          const customHandImageRef = useRef(null);

          // Proporción de aspecto del SVG actual para escalado perfecto
          const [svgAspectRatio, setSvgAspectRatio] = useState(1);

          const [isPlaying, setIsPlaying] = useState(false);
          const [animProgress, setAnimProgress] = useState(0); 
          const [currentPathIndex, setCurrentPathIndex] = useState(0);
          const [totalPathCount, setTotalPathCount] = useState(0);
          const [videoDurationSec, setVideoDurationSec] = useState(12); // Duración del video en segundos
          const [errorMsg, setErrorMsg] = useState(null);

          const canvasRef = useRef(null);
          const particleCanvasRef = useRef(null);
          const svgWrapperRef = useRef(null);
          const handRef = useRef(null);
          const mouseTimerRef = useRef(null);

          const animationRef = useRef(null);
          const pathsDataRef = useRef([]); 
          const particlesRef = useRef([]);
          const animTimeRef = useRef({ lastFrame: 0, currentProgress: 0 });

          // Escuchar atajos de teclado globales
          useEffect(() => {
            const handleKeyDown = (e) => {
              if (e.code === 'Space') {
                e.preventDefault();
                togglePlayback();
              } else if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                handleReset();
              } else if (e.key === 'Escape' && isFullscreen) {
                e.preventDefault();
                setIsFullscreen(false);
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [isFullscreen, isPlaying, animProgress]);

          // Desvanecer controles de grabación
          const handleMouseMoveOnCanvas = () => {
            if (!isFullscreen) return;
            setShowOverlayControls(true);
            clearTimeout(mouseTimerRef.current);
            mouseTimerRef.current = setTimeout(() => {
              setShowOverlayControls(false);
            }, 1500); 
          };

          const handleEnterFullscreen = () => {
            setIsFullscreen(true);
            setTimeout(() => {
              if (canvasRef.current) {
                canvasRef.current.focus();
              }
            }, 100);
          };

          const handleExitFullscreen = () => {
            setIsFullscreen(false);
          };

          const handleCanvasBackgroundClick = (e) => {
            if (!isFullscreen) return;
            if (e.target.closest('.overlay-control-bar')) return;
            togglePlayback();
          };

          // Sincronizar el SVG string a renderizar
          useEffect(() => {
            if (selectedTemplate === 'custom' && parsedCustomSvg) {
              setActiveSvgString(parsedCustomSvg);
            } else {
              if (selectedTemplate === 'rocket') setActiveSvgString(ROCKET_SVG);
              else setActiveSvgString(IDEA_SVG);
            }
            handleReset();
          }, [selectedTemplate, parsedCustomSvg]);

          // Calcular relación de aspecto dinámicamente cuando el SVG cambia
          useEffect(() => {
            if (!activeSvgString) return;
            try {
              const parser = new DOMParser();
              const doc = parser.parseFromString(activeSvgString, 'image/svg+xml');
              const svgEl = doc.querySelector('svg');
              if (svgEl) {
                const viewBoxAttr = svgEl.getAttribute('viewBox');
                const widthAttr = svgEl.getAttribute('width');
                const heightAttr = svgEl.getAttribute('height');

                let w = 100;
                let h = 100;

                if (viewBoxAttr) {
                  const parts = viewBoxAttr.trim().split(/[\s,]+/);
                  if (parts.length === 4) {
                    w = parseFloat(parts[2]) || 100;
                    h = parseFloat(parts[3]) || 100;
                  }
                } else if (widthAttr && heightAttr) {
                  w = parseFloat(widthAttr) || 100;
                  h = parseFloat(heightAttr) || 100;
                }

                if (w > 0 && h > 0 && !isNaN(w) && !isNaN(h)) {
                  setSvgAspectRatio(w / h);
                } else {
                  setSvgAspectRatio(1);
                }
              }
            } catch (e) {
              setSvgAspectRatio(1);
            }
          }, [activeSvgString]);

          useEffect(() => {
            setCustomStroke(activeTheme.defaultStroke);
            if (isSoundEnabled) {
              synthInstance.configureTheme(activeTheme.id);
            }
          }, [activeTheme]);

          useEffect(() => {
            if (isSoundEnabled) {
              synthInstance.init();
              synthInstance.configureTheme(activeTheme.id);
            } else {
              synthInstance.silence();
            }
            return () => synthInstance.silence();
          }, [isSoundEnabled]);

          useEffect(() => {
            const handleResize = () => {
              applyProgressToDOM(animProgress);
            };
            window.addEventListener('resize', handleResize);
            return () => window.removeEventListener('resize', handleResize);
          }, [animProgress]);

          useEffect(() => {
            applyProgressToDOM(animProgress);
          }, [customStroke, strokeWidth, handStyle, customPngOffsetX, customPngOffsetY, isFullscreen, svgAspectRatio, colorMode]);

          // =========================================================
          // EFECTO REACTIVO PARA CONVERSIÓN DE IMAGEN EN TIEMPO REAL
          // =========================================================
          // =====================================================================
          // EFECTO REACTIVO — MOTOR PROFESIONAL DE VECTORIZACIÓN (ASYNC)
          // Se activa cuando cambia la imagen o el preset seleccionado
          // =====================================================================
          useEffect(() => {
            if (!imgElement) return;
            let cancelled = false;

            const runTrace = async () => {
              setIsTracing(true);
              try {
                const preset = VECTOR_PRESETS[vectorPreset] || VECTOR_PRESETS.logo;
                const generatedSvg = await vectorizeImageAsync(imgElement, preset);
                if (!cancelled) {
                  setParsedCustomSvg(generatedSvg);
                  setSelectedTemplate('custom');
                  setErrorMsg(null);
                }
              } catch (err) {
                console.error('Error en vectorización:', err);
                if (!cancelled) setErrorMsg('Error al vectorizar imagen. Intenta con otro preset.');
              } finally {
                if (!cancelled) setIsTracing(false);
              }
            };

            const timer = setTimeout(runTrace, 120);
            return () => { cancelled = true; clearTimeout(timer); };
          }, [imgElement, vectorPreset]);

          // ==========================================
          // PARSEO Y PREPARACIÓN DE SEGMENTOS (ASYNC, por lotes para no congelar)
          // ==========================================
          const parseSVGAndInitialize = async () => {
            if (!svgWrapperRef.current) return;
            
            const rawPaths = Array.from(svgWrapperRef.current.querySelectorAll('.doodle-path'));
            if (rawPaths.length === 0) {
              setTotalPathCount(0);
              return;
            }

            const BATCH = 40; // paths por lote antes de ceder el hilo
            let totalLength = 0;
            const lengths = [];

            // Fase 1: medir longitudes y preparar estilos en lotes
            for (let i = 0; i < rawPaths.length; i += BATCH) {
              const batch = rawPaths.slice(i, i + BATCH);
              batch.forEach((path) => {
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                
                const originalFill = path.getAttribute('fill') || path.style.fill;
                if (originalFill && originalFill !== 'none' && originalFill !== 'transparent') {
                  path.setAttribute('data-original-fill', originalFill);
                  const currentStroke = path.getAttribute('stroke') || path.style.stroke;
                  if (!currentStroke || currentStroke === 'none') {
                    path.setAttribute('data-had-no-stroke', 'true');
                  }
                }

                let len = 100;
                try { len = path.getTotalLength() || 100; } catch(e) {}
                lengths.push(len);
                totalLength += len;

                path.style.strokeDasharray = `${len} ${len}`;
                path.style.strokeDashoffset = len;
                path.style.fill = 'none';
              });

              // Ceder el hilo al navegador entre lotes para no congelar la UI
              if (i + BATCH < rawPaths.length) {
                await new Promise(r => setTimeout(r, 0));
              }
            }

            // Fase 2: construir datos de porcentajes
            let accumulatedLength = 0;
            const parsedData = [];
            rawPaths.forEach((path, idx) => {
              const len = lengths[idx];
              const startPct = accumulatedLength / totalLength;
              accumulatedLength += len;
              const endPct = accumulatedLength / totalLength;
              parsedData.push({ element: path, length: len, startPct, endPct });
            });

            pathsDataRef.current = parsedData;
            setTotalPathCount(rawPaths.length);
            setCurrentPathIndex(0);

            // Calcular duración automática basada en cantidad de paths
            // 45ms por path, mínimo 10s, máximo 90s
            const autoDuration = Math.round(
              Math.max(10, Math.min(90, rawPaths.length * 0.045))
            );
            setVideoDurationSec(autoDuration);

            applyProgressToDOM(animProgress);
          };

          useEffect(() => {
            const timer = setTimeout(() => {
              parseSVGAndInitialize();
            }, 150);
            return () => clearTimeout(timer);
          }, [activeSvgString, strokeWidth]);

          // ==========================================
          // LOOP DE FRAME (REQUEST ANIMATION FRAME)
          // ==========================================
          const animateDraw = (timestamp) => {
            if (!animTimeRef.current.lastFrame) animTimeRef.current.lastFrame = timestamp;
            const elapsed = timestamp - animTimeRef.current.lastFrame;
            animTimeRef.current.lastFrame = timestamp;

            if (isPlaying) {
              const baseDurationMs = videoDurationSec * 1000;
              const increment = (elapsed / (baseDurationMs / drawingSpeed));
              let nextProgress = animTimeRef.current.currentProgress + increment;

              if (nextProgress >= 1) {
                nextProgress = 1;
                setIsPlaying(false);
                synthInstance.silence();
              }

              animTimeRef.current.currentProgress = nextProgress;
              setAnimProgress(nextProgress);
              applyProgressToDOM(nextProgress);
            }

            if (showParticles && handStyle === 'magic_wand') {
              updateAndRenderParticles();
            }

            animationRef.current = requestAnimationFrame(animateDraw);
          };

          useEffect(() => {
            animationRef.current = requestAnimationFrame(animateDraw);
            return () => cancelAnimationFrame(animationRef.current);
          }, [isPlaying, handStyle, showParticles, drawingSpeed, videoDurationSec]);

          // ==========================================
          // RESOLVER COORDENADAS ABSOLUTAS DE PANTALLA
          // ==========================================
          const getAbsoluteCoords = (svgX, svgY) => {
            const container = canvasRef.current;
            const svgEl = svgWrapperRef.current?.querySelector('svg');
            if (!svgEl || !container) return { x: 0, y: 0 };

            const rect = svgEl.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            const viewBoxAttr = svgEl.getAttribute('viewBox') || '0 0 100 100';
            const viewBoxParts = viewBoxAttr.trim().split(/[\s,]+/);
            
            let vbMinX = 0, vbMinY = 0, vbW = 100, vbH = 100;
            if (viewBoxParts.length === 4) {
              vbMinX = parseFloat(viewBoxParts[0]);
              vbMinY = parseFloat(viewBoxParts[1]);
              vbW = parseFloat(viewBoxParts[2]);
              vbH = parseFloat(viewBoxParts[3]);
            }

            const scaleX = vbW > 0 ? rect.width / vbW : 1;
            const scaleY = vbH > 0 ? rect.height / vbH : 1;

            const px = ((svgX - vbMinX) * scaleX) + (rect.left - containerRect.left);
            const py = ((svgY - vbMinY) * scaleY) + (rect.top - containerRect.top);

            return { x: px, y: py };
          };

          // =========================================================
          // MOTOR DE INYECCIÓN DE ESTILOS (OUTLINE-TO-FILL)
          // =========================================================
          const applyProgressToDOM = (progress) => {
            const data = pathsDataRef.current;
            const svgEl = svgWrapperRef.current?.querySelector('svg');
            if (data.length === 0 || !svgEl) return;

            let activeIdx = 0;
            let handCoords = { x: 0, y: 0 };
            let isCurrentlyTracing = false;

            data.forEach((pathObj, idx) => {
              const { element, length, startPct, endPct } = pathObj;

              const originalFill = element.getAttribute('data-original-fill');
              const hadNoStroke = element.getAttribute('data-had-no-stroke') === 'true';

              if (progress <= startPct) {
                element.style.strokeDashoffset = length;
                element.style.fill = 'none';
                if (hadNoStroke) {
                  element.style.stroke = 'transparent';
                }
              } else if (progress >= endPct) {
                element.style.strokeDashoffset = 0;
                if (originalFill) {
                  element.style.fill = originalFill;
                } else {
                  element.style.fill = 'none';
                }

                if (hadNoStroke) {
                  const strokeCol = (colorMode === 'color')
                    ? (element.getAttribute('stroke') || element.getAttribute('data-color-stroke') || originalFill || 'transparent')
                    : (originalFill || 'transparent');
                  element.style.stroke = strokeCol;
                  element.style.strokeWidth = '0.5px';
                } else {
                  const strokeCol = (colorMode === 'color')
                    ? (element.getAttribute('stroke') || element.getAttribute('data-color-stroke') || customStroke || 'currentColor')
                    : (customStroke || element.getAttribute('stroke') || 'currentColor');
                  element.style.stroke = strokeCol;
                  element.style.strokeWidth = `${strokeWidth}px`;
                }
                element.style.transition = 'fill 0.4s ease-in-out, stroke 0.4s ease-in-out';
              } else {
                activeIdx = idx;
                isCurrentlyTracing = true;
                const localProgress = (progress - startPct) / (endPct - startPct);
                const currentOffset = length * (1 - localProgress);
                element.style.strokeDashoffset = currentOffset;

                element.style.fill = 'none';
                element.style.transition = 'none';

                if (hadNoStroke) {
                  const strokeCol = (colorMode === 'color')
                    ? (element.getAttribute('stroke') || element.getAttribute('data-color-stroke') || originalFill || '#000000')
                    : (customStroke || originalFill || '#000000');
                  element.style.stroke = strokeCol;
                  element.style.strokeWidth = `${strokeWidth}px`;
                } else {
                  const strokeCol = (colorMode === 'color')
                    ? (element.getAttribute('stroke') || element.getAttribute('data-color-stroke') || customStroke || 'currentColor')
                    : (customStroke || element.getAttribute('stroke') || 'currentColor');
                  element.style.stroke = strokeCol;
                  element.style.strokeWidth = `${strokeWidth}px`;
                }

                try {
                  const pointAt = element.getPointAtLength(localProgress * length);
                  
                  let pt = svgEl.createSVGPoint();
                  pt.x = pointAt.x;
                  pt.y = pointAt.y;
                  const ctmMatrix = element.getCTM();
                  if (ctmMatrix) {
                    pt = pt.matrixTransform(ctmMatrix);
                  }
                  handCoords = { x: pt.x, y: pt.y };
                } catch (e) {}
              }
            });

            if (handRef.current) {
              if (handStyle === 'none') {
                handRef.current.style.opacity = '0'; 
              } else if (isCurrentlyTracing) {
                let wobbleX = 0;
                let wobbleY = 0;
                if (isPlaying && isCurrentlyTracing) {
                  const t = Date.now() * 0.05;
                  wobbleX = Math.sin(t) * 3;
                  wobbleY = Math.cos(t * 1.3) * 3;
                }
                const absCoords = getAbsoluteCoords(handCoords.x, handCoords.y);
                handRef.current.style.transform = `translate3d(${absCoords.x + wobbleX}px, ${absCoords.y + wobbleY}px, 0)`;
                handRef.current.style.opacity = '1';

                if (showParticles && handStyle === 'magic_wand' && isPlaying) {
                  spawnParticlesAt(absCoords.x, absCoords.y);
                }

                // Sincronizar dinámicamente el color de la punta del marcador en vista previa
                if (handStyle === 'marker_right') {
                  const activePathObj = data[activeIdx];
                  let activeColor = customStroke || '#000000';
                  if (activePathObj) {
                    const el = activePathObj.element;
                    let strokeColor = el.style.stroke || el.getAttribute('stroke') || 'currentColor';
                    const dataColor = el.getAttribute('data-color-stroke');
                    if (colorMode === 'color' && dataColor) {
                      strokeColor = dataColor;
                    } else if (strokeColor === 'currentColor') {
                      strokeColor = customStroke || activeTheme.defaultStroke || '#000000';
                    }
                    activeColor = strokeColor;
                  }
                  handRef.current.querySelectorAll('.doodle-marker-tip').forEach(el => {
                    el.setAttribute('fill', activeColor);
                    el.style.fill = activeColor;
                  });
                }
              } else {
                if (handStyle === 'marker_right') {
                  const activeColor = customStroke || activeTheme.defaultStroke || '#000000';
                  handRef.current.querySelectorAll('.doodle-marker-tip').forEach(el => {
                    el.setAttribute('fill', activeColor);
                    el.style.fill = activeColor;
                  });
                }

                if (progress >= 1 && data.length > 0) {
                  try {
                    const lastPath = data[data.length - 1];
                    const lastPt = lastPath.element.getPointAtLength(lastPath.length);
                    
                    let pt = svgEl.createSVGPoint();
                    pt.x = lastPt.x; pt.y = lastPt.y;
                    const ctmMatrix = lastPath.element.getCTM();
                    if (ctmMatrix) pt = pt.matrixTransform(ctmMatrix);

                    const absCoords = getAbsoluteCoords(pt.x, pt.y);
                    handRef.current.style.transform = `translate3d(${absCoords.x}px, ${absCoords.y}px, 0)`;
                    setTimeout(() => {
                      if (!isPlaying && handRef.current && handStyle !== 'none') handRef.current.style.opacity = '0.15';
                    }, 800);
                  } catch(e){}
                } else if (progress <= 0 && data.length > 0) {
                  try {
                    const firstPath = data[0];
                    const firstPt = firstPath.element.getPointAtLength(0);

                    let pt = svgEl.createSVGPoint();
                    pt.x = firstPt.x; pt.y = firstPt.y;
                    const ctmMatrix = firstPath.element.getCTM();
                    if (ctmMatrix) pt = pt.matrixTransform(ctmMatrix);

                    const absCoords = getAbsoluteCoords(pt.x, pt.y);
                    handRef.current.style.transform = `translate3d(${absCoords.x}px, ${absCoords.y}px, 0)`;
                    handRef.current.style.opacity = '1';
                  } catch(e){}
                }
              }
            }

            if (isPlaying && isCurrentlyTracing && isSoundEnabled) {
              const randomFriction = 0.8 + Math.random() * 0.4;
              synthInstance.setDrawingSpeed(drawingSpeed * randomFriction, strokeWidth);
            } else {
              synthInstance.silence();
            }

            setCurrentPathIndex(activeIdx);
          };

          const handleProgressSlider = (e) => {
            const val = parseFloat(e.target.value);
            animTimeRef.current.currentProgress = val;
            setAnimProgress(val);
            applyProgressToDOM(val);
          };

          const togglePlayback = () => {
            if (animProgress >= 1) {
              animTimeRef.current.currentProgress = 0;
              setAnimProgress(0);
            }
            setIsPlaying(!isPlaying);
            animTimeRef.current.lastFrame = 0;
          };

          const handleReset = () => {
            setIsPlaying(false);
            animTimeRef.current.currentProgress = 0;
            setAnimProgress(0);
            applyProgressToDOM(0);
            synthInstance.silence();
          };

          const spawnParticlesAt = (px, py) => {
            const canvas = particleCanvasRef.current;
            if (!canvas) return;

            for (let i = 0; i < 3; i++) {
              particlesRef.current.push({
                x: px,
                y: py,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.8) * 3 - 1, 
                color: `hsl(${Math.random() * 360}, 95%, 70%)`,
                size: Math.random() * 4 + 2,
                alpha: 1,
                life: 1.0 
              });
            }
          };

          const updateAndRenderParticles = () => {
            const canvas = particleCanvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
              canvas.width = canvas.clientWidth;
              canvas.height = canvas.clientHeight;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const activeParticles = [];
            particlesRef.current.forEach((p) => {
              p.x += p.vx;
              p.y += p.vy;
              p.vy += 0.05; 
              p.alpha -= 0.025;
              p.life -= 0.025;

              if (p.alpha > 0) {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fill();
                ctx.restore();
                activeParticles.push(p);
              }
            });

            particlesRef.current = activeParticles;
          };

          const processAndSetSvg = (svgString) => {
            try {
              const parser = new DOMParser();
              const doc = parser.parseFromString(svgString, 'image/svg+xml');
              const parserError = doc.querySelector('parsererror');
              
              if (parserError) {
                setErrorMsg("El archivo SVG cargado tiene errores de formato XML.");
                return;
              }

              // --- SANEAMIENTO Y ESQUELETIZACIÓN DE ATRIBUTOS SVG ---
              const svgEl = doc.querySelector('svg');
              if (svgEl) {
                let widthAttr = svgEl.getAttribute('width');
                let heightAttr = svgEl.getAttribute('height');
                let viewBoxAttr = svgEl.getAttribute('viewBox');

                // Crear un viewBox si solo posee ancho/alto fijos
                if ((widthAttr || heightAttr) && !viewBoxAttr) {
                  const wVal = parseFloat(widthAttr) || 800;
                  const hVal = parseFloat(heightAttr) || 600;
                  svgEl.setAttribute('viewBox', `0 0 ${wVal} ${hVal}`);
                }

                if (!viewBoxAttr && !widthAttr && !heightAttr) {
                  svgEl.setAttribute('viewBox', '0 0 800 600');
                }

                // Despojar al SVG de cualquier ancho o alto fijo que rompa la responsividad
                svgEl.removeAttribute('width');
                svgEl.removeAttribute('height');
                svgEl.setAttribute('width', '100%');
                svgEl.setAttribute('height', '100%');
                svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');

                // Asegurar que no existan estilos CSS incrustados forzando anchos fijos en la raíz
                svgEl.style.width = '';
                svgEl.style.height = '';
                svgEl.style.maxWidth = '';
                svgEl.style.maxHeight = '';
              }

              convertSvgShapesToPaths(doc);

              const paths = doc.querySelectorAll('path');
              if (paths.length === 0) {
                setErrorMsg("Este archivo no posee líneas de trazos o paths vectoriales.");
                return;
              }

              paths.forEach((p) => {
                p.classList.add('doodle-path');

                // Resolver fill y stroke con herencia completa de grupos
                let fill = getComputedStyleValue(p, 'fill');
                let stroke = getComputedStyleValue(p, 'stroke');

                // Si no tiene fill ni stroke, asumir trazo negro (SVG sin estilos explícitos)
                if (!fill && !stroke) {
                  fill = 'none';
                  stroke = '#000000';
                } else {
                  fill = fill || 'none';
                  stroke = stroke || 'none';
                }

                // Si el path sólo tiene fill (sin stroke), usar el fill como stroke
                // para que pueda ser animado con dashoffset
                if (fill !== 'none' && (stroke === 'none' || !stroke)) {
                  p.setAttribute('data-original-fill', fill);
                  stroke = fill; // la animación usará stroke = color del fill
                }

                p.setAttribute('fill', fill);
                p.setAttribute('stroke', stroke);
              });

              const serializer = new XMLSerializer();
              const serializedSvg = serializer.serializeToString(doc);

              setParsedCustomSvg(serializedSvg);
              setSelectedTemplate('custom');
              setUploadedImageSrc(null);
              setImgElement(null);
              setErrorMsg(null);
              handleReset();
            } catch (err) {
              setErrorMsg("Ocurrió un error leyendo las rutas de tu archivo.");
            }
          };

          const handleCustomSvgSubmit = (e) => {
            e.preventDefault();
            if (!customSvgInput.trim()) return;
            processAndSetSvg(customSvgInput);
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              const code = event.target.result;
              setCustomSvgInput(code);
              processAndSetSvg(code);
            };
            reader.readAsText(file);
          };

          // Controlar carga de imagen ráster (PNG/JPG)
          const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
              setErrorMsg("Selecciona un archivo de imagen compatible (PNG, JPG, JPEG, WEBP).");
              return;
            }

            setErrorMsg(null);
            const reader = new FileReader();
            reader.onload = (event) => {
              setUploadedImageSrc(event.target.result);
              const img = new Image();
              img.onload = () => {
                setImgElement(img);
              };
              img.onerror = () => {
                setErrorMsg("No se pudo cargar la imagen seleccionada.");
              };
              img.src = event.target.result;
            };
            reader.onerror = () => {
              setErrorMsg("Fallo al leer el archivo de imagen.");
            };
            reader.readAsDataURL(file);
          };
          const clearUploadedImage = () => {
            setUploadedImageSrc(null);
            setImgElement(null);
            setParsedCustomSvg(null);
            setSelectedTemplate('idea');
            handleReset();
          };

          // ==========================================================
          // RENDERIZADO EN CANVAS (EXPORTACIÓN DE VIDEO EN ALTA CALIDAD)
          // ==========================================================
          const drawCanvasBackground = (ctx, w, h, theme, showGrid) => {
            // Rellenar fondo base
            if (theme.id === 'whiteboard') {
              ctx.fillStyle = '#f8fafc';
            } else if (theme.id === 'chalkboard') {
              ctx.fillStyle = '#022c22'; // Esmeralda muy oscuro
            } else if (theme.id === 'blueprint') {
              ctx.fillStyle = '#1e3a8a'; // Azul marino plano
            } else {
              ctx.fillStyle = '#0f172a';
            }
            ctx.fillRect(0, 0, w, h);

            // Dibujar rejilla si está habilitada
            if (showGrid) {
              ctx.save();
              if (theme.id === 'whiteboard') {
                ctx.fillStyle = '#cbd5e1';
                const gap = 24;
                for (let x = gap / 2; x < w; x += gap) {
                  for (let y = gap / 2; y < h; y += gap) {
                    ctx.beginPath();
                    ctx.arc(x, y, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                  }
                }
              } else if (theme.id === 'chalkboard') {
                ctx.strokeStyle = '#047857';
                ctx.lineWidth = 1;
                const gap = 40;
                ctx.beginPath();
                for (let x = 0; x < w; x += gap) {
                  ctx.moveTo(x, 0);
                  ctx.lineTo(x, h);
                }
                for (let y = 0; y < h; y += gap) {
                  ctx.moveTo(0, y);
                  ctx.lineTo(w, y);
                }
                ctx.stroke();
              } else if (theme.id === 'blueprint') {
                ctx.strokeStyle = '#1d4ed8';
                ctx.lineWidth = 1;
                const gap = 20;
                ctx.beginPath();
                for (let x = 0; x < w; x += gap) {
                  ctx.moveTo(x, 0);
                  ctx.lineTo(x, h);
                }
                for (let y = 0; y < h; y += gap) {
                  ctx.moveTo(0, y);
                  ctx.lineTo(w, y);
                }
                ctx.stroke();
              }
              ctx.restore();
            }

            // Efecto polvo para pizarrón verde
            if (theme.dusty) {
              ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
              ctx.fillRect(0, 0, w, h);
            }
          };

          const drawMarkerRightHand = (ctx, x, y, strokeColor) => {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(0.85, 0.85);
            ctx.translate(0, -254);
            if (defaultMarkerHandImg.loaded) {
              ctx.drawImage(defaultMarkerHandImg.img, 0, 0, 372, 300);
            }
            ctx.restore();
          };

          const drawChalkHand = (ctx, x, y) => {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(0.8, 0.8);
            ctx.translate(-1, -112);

            // Sombra
            ctx.fillStyle = 'rgba(0,0,0,0.12)';
            ctx.beginPath();
            ctx.ellipse(40, 115, 15, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Tiza rotada
            ctx.save();
            ctx.translate(3, 100);
            ctx.rotate(-15 * Math.PI / 180);
            ctx.translate(-3, -100);
            ctx.fillStyle = '#f8fafc';
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, 110);
            ctx.lineTo(8, 110);
            ctx.lineTo(6, 85);
            ctx.lineTo(-2, 85);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            // Dedos / Mano
            ctx.fillStyle = '#ffdbac';
            ctx.strokeStyle = '#c58b51';
            ctx.lineWidth = 1.2;
            
            ctx.beginPath();
            ctx.moveTo(2, 92);
            ctx.bezierCurveTo(-10, 80, 5, 60, 15, 72);
            ctx.bezierCurveTo(25, 84, 18, 100, 8, 102);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(12, 85);
            ctx.bezierCurveTo(8, 70, 25, 65, 25, 80);
            ctx.bezierCurveTo(25, 92, 12, 95, 12, 85);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
          };

          const drawMagicWand = (ctx, x, y, frameCount) => {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(0.9, 0.9);
            ctx.translate(0, -95);

            // Destello circular animado
            const radius = 14 + Math.sin((frameCount || 0) * 0.18) * 3;
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
            grad.addColorStop(0, 'rgba(254, 240, 138, 0.6)');
            grad.addColorStop(1, 'rgba(250, 204, 21, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.fill();

            // Cuerpo varita
            ctx.fillStyle = '#475569';
            ctx.fillRect(-4, 10, 8, 90);

            // Punta amarilla
            ctx.fillStyle = '#fef08a';
            ctx.fillRect(-4, 1, 8, 18);

            // Estrella
            ctx.fillStyle = '#facc15';
            ctx.strokeStyle = '#ca8a04';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, -12);
            ctx.lineTo(3, -4);
            ctx.lineTo(11, -3);
            ctx.lineTo(5, 3);
            ctx.lineTo(7, 11);
            ctx.lineTo(0, 7);
            ctx.lineTo(-7, 11);
            ctx.lineTo(-5, 3);
            ctx.lineTo(-11, -3);
            ctx.lineTo(-3, -4);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
          };

          const drawParticlesOnCanvas = (ctx, particlesList) => {
            particlesList.forEach(p => {
              ctx.save();
              ctx.globalAlpha = p.alpha;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              ctx.fillStyle = p.color;
              ctx.shadowBlur = 10;
              ctx.shadowColor = p.color;
              ctx.fill();
              ctx.restore();
            });
          };

          // ==========================================================
          // OBTENER COORDENADAS Y COLOR DE MANO SEGÚN GEOMETRÍA SVG
          // ==========================================================
          const getHandCoordsAtProgress = (progress) => {
            const data = pathsDataRef.current;
            const svgEl = svgWrapperRef.current?.querySelector('svg');
            if (data.length === 0 || !svgEl) return null;

            // Encontrar la ruta activa en este punto del progreso
            let activePathObj = null;
            let localProgress = 0;
            let activeIdx = 0;

            for (let idx = 0; idx < data.length; idx++) {
              const pathObj = data[idx];
              if (progress > pathObj.startPct && progress < pathObj.endPct) {
                activePathObj = pathObj;
                localProgress = (progress - pathObj.startPct) / (pathObj.endPct - pathObj.startPct);
                activeIdx = idx;
                break;
              }
            }

            if (!activePathObj) {
              if (progress <= 0) {
                activePathObj = data[0];
                localProgress = 0;
                activeIdx = 0;
              } else {
                activePathObj = data[data.length - 1];
                localProgress = 1;
                activeIdx = data.length - 1;
              }
            }

            try {
              const element = activePathObj.element;
              const length = activePathObj.length;
              const pointAt = element.getPointAtLength(localProgress * length);
              
              let pt = svgEl.createSVGPoint();
              pt.x = pointAt.x;
              pt.y = pointAt.y;
              const ctmMatrix = element.getCTM();
              if (ctmMatrix) {
                pt = pt.matrixTransform(ctmMatrix);
              }

              // Determinar el color del trazo del elemento activo
              let strokeColor = element.style.stroke || element.getAttribute('stroke') || 'currentColor';
              const dataColor = element.getAttribute('data-color-stroke');
              if (colorMode === 'color' && dataColor) {
                strokeColor = dataColor;
              } else if (strokeColor === 'currentColor') {
                strokeColor = customStroke || activeTheme.defaultStroke || '#000000';
              }
              
              return { x: pt.x, y: pt.y, color: strokeColor };
            } catch (e) {
              return null;
            }
          };

          const handleExportVideo = async (mode) => {
            if (isExporting) return;
            
            const svgEl = svgWrapperRef.current?.querySelector('svg');
            if (!svgEl) {
              setErrorMsg("No hay ningún dibujo en el lienzo para exportar.");
              return;
            }

            setIsExporting(true);
            setExportProgress(0);
            setExportMode(mode);
            exportCancelledRef.current = false;
            setExportStatusText("Preparando lienzo Full HD (1920x1080)...");

            const originalIsPlaying = isPlaying;
            setIsPlaying(false);

            const width = 1920;
            const height = 1080;
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = width;
            exportCanvas.height = height;
